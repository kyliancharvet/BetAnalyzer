<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetAnalyzer Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;
  --bg2:rgba(255,255,255,0.04);--bg3:rgba(255,255,255,0.07);--bg4:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --blue:#3B82F6;--purple:#8B5CF6;--orange:#F97316;--orange2:#FB923C;
  --green:#10B981;--red:#EF4444;--gold:#F59E0B;
  --text:#FFFFFF;--text2:#94A3B8;--text3:#475569;
  --r:16px;--r2:12px;--r3:8px;
  --fh:'Geist',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;
}
body{background:var(--bg);background-image:radial-gradient(ellipse at 15% 40%,rgba(59,130,246,0.08) 0%,transparent 55%),radial-gradient(ellipse at 85% 15%,rgba(139,92,246,0.06) 0%,transparent 50%),radial-gradient(ellipse at 60% 90%,rgba(16,185,129,0.04) 0%,transparent 45%);background-attachment:fixed;color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--fb)}
input,select{font-family:var(--fb);color:var(--text);background:var(--bg3)}

/* NAV */
#nav{position:sticky;top:0;z-index:200;background:rgba(5,5,8,0.75);border-bottom:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.nav-logo{font-family:var(--fh);font-size:20px;font-weight:900;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
.nav-logo .bet{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-logo .analyzer{color:var(--text)}
.nav-logo .pro-badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;-webkit-text-fill-color:#fff;padding:3px 9px;border-radius:20px;font-family:var(--fb)}
.nav-logo .grad{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text2);padding:7px 16px;border-radius:var(--r3);font-size:13px;font-weight:500;transition:all .2s;backdrop-filter:blur(8px)}
.nav-btn:hover{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.4);color:var(--text)}
.breadcrumb{font-size:13px;color:var(--text3);display:flex;align-items:center;gap:6px}
.breadcrumb span{color:var(--text2)}
.breadcrumb .bc-active{color:var(--blue)}
.bc-sep{color:var(--text3)}

/* PAGES */
.page{display:none;animation:pageIn .35s cubic-bezier(0.16,1,0.3,1)}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* HOME */
#page-home{padding:40px 20px;max-width:1000px;margin:0 auto}
.home-hero{text-align:center;margin-bottom:52px;padding:16px}
.home-hero h1{font-family:var(--fh);font-size:clamp(28px,5vw,52px);font-weight:900;line-height:1.1;margin-bottom:12px;letter-spacing:-1px}
.home-hero h1 span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-hero p{color:var(--text2);font-size:16px}
.sport-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:900px;margin:0 auto}
.sport-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:var(--r2);padding:12px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .22s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden;backdrop-filter:blur(12px)}
.sport-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,0.15) 0%,transparent 70%);opacity:0;transition:opacity .22s}
.sport-card:hover::before{opacity:1}
.sport-card:hover{border-color:rgba(59,130,246,0.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,0.15)}
.sport-card .icon{font-size:22px;display:block;flex-shrink:0}
.sport-card .name{font-size:14px;font-weight:700;color:var(--text)}
.sport-card .sub{font-size:11px;color:var(--text3);margin-top:2px}
.sport-card.selected{border-color:rgba(59,130,246,0.5);background:rgba(59,130,246,0.1)}

/* MATCHES PAGE */
#page-matches{padding:24px 20px;max-width:1100px;margin:0 auto}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-header h2{font-family:var(--fh);font-size:20px;font-weight:800}
.league-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.league-select{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:10px 16px;border-radius:var(--r2);font-size:14px;font-weight:500;min-width:220px;outline:none;cursor:pointer;transition:border-color .2s;backdrop-filter:blur(8px)}
.league-select:hover,.league-select:focus{border-color:rgba(59,130,246,0.5)}
.refresh-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text2);padding:10px 16px;border-radius:var(--r2);font-size:13px;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:6px}
.refresh-btn:hover{border-color:rgba(59,130,246,0.4);color:var(--text)}
.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.match-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .25s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.match-card:hover{border-color:rgba(59,130,246,0.3);transform:translateY(-3px);box-shadow:0 0 40px rgba(59,130,246,0.12),0 20px 40px rgba(0,0,0,0.3)}
.match-card.selected{border-color:rgba(59,130,246,0.45);background:rgba(59,130,246,0.08);box-shadow:0 0 40px rgba(59,130,246,0.15)}
.match-card .mc-league{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px}
.match-card .mc-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
.match-card .mc-team{flex:1;text-align:center}
.mc-team-name{font-family:var(--fh);font-size:15px;font-weight:800;line-height:1.2}
.mc-team-badge{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 8px;border:1px solid rgba(255,255,255,0.1)}
.match-card .mc-vs{font-size:11px;font-weight:700;color:var(--text3);padding:6px 10px;background:rgba(255,255,255,0.06);border-radius:var(--r3);border:1px solid rgba(255,255,255,0.08)}
.match-card .mc-time{font-size:12px;color:var(--text2);text-align:center;margin-top:4px}
.match-card .mc-odds{display:flex;gap:6px;margin-top:14px;justify-content:center}
.mc-odd{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r3);padding:6px 10px;text-align:center;flex:1;transition:all .15s}
.mc-odd:hover{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.3)}
.mc-odd .ol{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.mc-odd .ov{font-size:16px;font-weight:900;color:var(--text);font-family:monospace}
.match-card .mc-live{position:absolute;top:14px;right:14px;display:flex;align-items:center;gap:5px;color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(239,68,68,0.9)}
.match-card .mc-live::before{content:'';width:6px;height:6px;border-radius:50%;background:#fff;animation:livePulse 1.5s infinite;flex-shrink:0}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.35;transform:scale(0.7)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.analyze-bar{margin-top:24px;text-align:center}
#analyze-btn{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;padding:16px 52px;border-radius:var(--r2);font-family:var(--fh);font-size:16px;font-weight:800;letter-spacing:1px;transition:all .25s cubic-bezier(0.16,1,0.3,1);box-shadow:0 4px 24px rgba(59,130,246,0.35);text-transform:uppercase}
#analyze-btn:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(59,130,246,0.5)}
#analyze-btn:disabled{opacity:0.35;transform:none;cursor:not-allowed;box-shadow:none}

/* ANALYSIS PAGE */
#page-analysis{padding:24px 20px;max-width:1200px;margin:0 auto}
.analysis-grid{display:grid;grid-template-columns:1fr;gap:20px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:var(--r);overflow:hidden;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:box-shadow .3s}
.card:hover{box-shadow:0 0 40px rgba(59,130,246,0.08)}
.card-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);display:flex;align-items:center;gap:8px}
.card-body{padding:20px}

/* MATCH HEADER */
.match-header-card{background:linear-gradient(135deg,rgba(59,130,246,0.07) 0%,rgba(5,5,8,0.8) 50%,rgba(139,92,246,0.07) 100%);border:1px solid rgba(59,130,246,0.2)}
.match-header-inner{padding:36px 28px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:24px}
.mh-team{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px}
.mh-badge{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:40px;border:2px solid rgba(255,255,255,0.1);box-shadow:0 0 24px rgba(59,130,246,0.15)}
.mh-name{font-family:var(--fh);font-size:22px;font-weight:800;letter-spacing:-0.5px}
.mh-center{text-align:center}
.mh-vs{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--text3);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r2);padding:8px 16px}
.mh-date{font-size:12px;color:var(--text2);margin-top:6px}
.mh-competition{font-size:11px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* FORM BADGES */
.form-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.form-badge{width:30px;height:30px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.form-badge.W{background:rgba(16,185,129,0.2);color:var(--green);border:1px solid rgba(16,185,129,0.35)}
.form-badge.D{background:rgba(148,163,184,0.1);color:var(--text2);border:1px solid rgba(148,163,184,0.2)}
.form-badge.L{background:rgba(239,68,68,0.2);color:var(--red);border:1px solid rgba(239,68,68,0.3)}

/* STATS COMPARISON */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.stat-row{margin-bottom:16px}
.stat-label{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:8px}
.stat-bars{display:flex;align-items:center;gap:8px}
.stat-val{font-size:15px;font-weight:800;min-width:36px;font-family:monospace}
.stat-val.home{text-align:right}
.stat-val.away{text-align:left}
.stat-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.stat-bar{height:100%;border-radius:3px;transition:width .8s cubic-bezier(0.16,1,0.3,1)}
.stat-bar.home{background:linear-gradient(90deg,var(--blue),var(--purple));margin-left:auto}
.stat-bar.away{background:linear-gradient(90deg,var(--orange),var(--orange2))}

/* FORM */
.form-dot{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:12px;font-weight:800;flex-shrink:0}
.form-dot.W{background:var(--green);color:#fff}
.form-dot.D{background:rgba(148,163,184,0.25);color:var(--text);border:1px solid rgba(148,163,184,0.3)}
.form-dot.L{background:var(--red);color:#fff}
.form-match-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;transition:background .15s}
.form-match-row:hover{background:rgba(255,255,255,0.02)}
.form-match-row:last-child{border-bottom:none}
.form-indicator{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px}
.form-indicator.in{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3)}
.form-indicator.out{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.form-indicator.mixed{background:rgba(245,158,11,0.15);color:var(--gold);border:1px solid rgba(245,158,11,0.3)}

/* H2H */
.h2h-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.h2h-row:last-child{border-bottom:none}
.h2h-date{font-size:11px;color:var(--text3);min-width:70px}
.h2h-teams{flex:1;font-size:13px;color:var(--text2)}
.h2h-score{font-size:14px;font-weight:800;min-width:50px;text-align:center;font-family:monospace}
.h2h-score.hw{color:var(--green)}
.h2h-score.aw{color:var(--red)}
.h2h-score.draw{color:var(--text2)}

/* MARKETS TABLE */
.markets-tabs{display:flex;gap:2px;padding:14px 16px 0;border-bottom:1px solid rgba(255,255,255,0.07);overflow-x:auto}
.market-tab{padding:8px 16px;font-size:12px;font-weight:700;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;text-transform:uppercase;letter-spacing:0.8px}
.market-tab:hover{color:var(--text2)}
.market-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.market-panel{display:none;padding:16px 20px}
.market-panel.active{display:block}
.market-table{width:100%;border-collapse:collapse}
.market-table th{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:8px 10px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.07)}
.market-table td{padding:11px 10px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;vertical-align:middle}
.market-table tr:last-child td{border-bottom:none}
.market-table tr:hover td{background:rgba(255,255,255,0.025)}
.mkt-name{font-weight:700;color:var(--text)}
.mkt-our-prob{color:var(--text2);font-family:monospace}
.book-odds{display:flex;flex-wrap:wrap;gap:4px}
.book-chip{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r3);padding:3px 8px;font-size:11px;font-weight:700;white-space:nowrap;transition:background .15s}
.book-chip.best{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.35);color:var(--green)}
.ev-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800;white-space:nowrap}
.ev-badge.strong{background:rgba(16,185,129,0.2);color:var(--green);border:1px solid rgba(16,185,129,0.4)}
.ev-badge.mild{background:rgba(16,185,129,0.1);color:#6ee7b7;border:1px solid rgba(16,185,129,0.2)}
.ev-badge.neutral{background:rgba(148,163,184,0.1);color:var(--text2);border:1px solid rgba(148,163,184,0.2)}
.ev-badge.negative{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}

/* VALUE BETS */
.value-bets-list{display:grid;gap:12px}
.vb-card{border:1px solid rgba(255,255,255,0.08);border-radius:var(--r2);padding:18px;transition:all .25s;position:relative;overflow:hidden;background:rgba(255,255,255,0.03)}
.vb-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.vb-card.top1{border-color:rgba(249,115,22,0.5);background:rgba(249,115,22,0.05);box-shadow:0 0 24px rgba(249,115,22,0.1)}
.vb-card.top2{border-color:rgba(16,185,129,0.4);background:rgba(16,185,129,0.05)}
.vb-card.top3{border-color:rgba(59,130,246,0.35);background:rgba(59,130,246,0.05)}
.vb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.vb-market{font-family:var(--fh);font-size:15px;font-weight:800}
.vb-badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:1px}
.vb-badge.bot{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff}
.vb-badge.val{background:var(--green);color:#fff}
.vb-badge.strong-ev{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
.vb-details{display:flex;gap:20px;flex-wrap:wrap}
.vb-detail{display:flex;flex-direction:column;gap:3px}
.vb-detail .dl{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.8px}
.vb-detail .dv{font-family:var(--fh);font-size:18px;font-weight:900}
.vb-detail .dv.green{color:var(--green)}
.vb-detail .dv.gold{color:var(--orange)}
.confidence-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:12px}
.confidence-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--purple))}
.confidence-label{font-size:11px;color:var(--text3);margin-top:5px}
.vb-kelly{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0 4px;padding:8px 12px;background:rgba(59,130,246,0.08);border-radius:var(--r3);border:1px solid rgba(59,130,246,0.2)}
.kelly-pct{font-family:var(--fh);font-size:14px;font-weight:900;color:var(--blue)}
.kelly-stake{font-size:13px;font-weight:700;color:var(--green)}
.kelly-edge{font-size:12px;color:var(--text3);margin-left:auto}

/* AI SCOUT REPORT */
.ai-card{border-color:rgba(249,115,22,0.2)}
.ai-header{background:linear-gradient(135deg,rgba(249,115,22,0.1),rgba(251,146,60,0.04));padding:16px 20px;border-bottom:1px solid rgba(249,115,22,0.15);display:flex;align-items:center;gap:10px}
.ai-header h3{font-family:var(--fh);font-size:16px;font-weight:800}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:livePulse 1.5s infinite}
.ai-body{padding:20px;line-height:1.75;color:var(--text2)}
.ai-section{margin-bottom:16px}
.ai-section h4{font-family:var(--fh);font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.ai-section p{font-size:14px;color:var(--text2)}
.ai-key-point{display:flex;gap:8px;margin-bottom:8px;font-size:14px}
.ai-key-point::before{content:'→';color:var(--blue);flex-shrink:0;font-weight:700}

/* VERDICT */
.verdict-card{background:linear-gradient(135deg,rgba(249,115,22,0.06),rgba(5,5,8,0.9));border-color:rgba(249,115,22,0.25)}
.verdict-top{background:linear-gradient(135deg,rgba(249,115,22,0.12),rgba(251,146,60,0.06));padding:24px;border-bottom:1px solid rgba(249,115,22,0.2);text-align:center}
.verdict-top h2{font-family:var(--fh);font-size:24px;font-weight:900;color:var(--orange)}
.verdict-top p{font-size:13px;color:var(--text2);margin-top:5px}
.verdict-body{padding:20px}

// Half-Kelly Criterion: f* = (b·p − q)/b, halved, capped at 25%
function calcKelly(ourProb, decimalOdds){
  if(!ourProb||!decimalOdds||decimalOdds<=1||ourProb<=0||ourProb>=1) return 0;
  const b=decimalOdds-1, p=ourProb, q=1-ourProb;
  const f=(b*p-q)/b;
  if(f<=0) return 0;
  return Math.min(f/2, 0.25);
}
function clamp(x,lo,hi){ return Math.max(lo,Math.min(hi,x)); }

function poisson(k, lam){
  let r=Math.exp(-lam);
  for(let i=1;i<=k;i++) r*=lam/i;
  return r;
}

// Dixon-Coles correction factor for low-scoring outcomes (ρ = -0.13 for international football)
const DC_RHO = -0.13;
function dcTau(h, a, lh, la, rho){
  if(h===0&&a===0) return 1-lh*la*rho;
  if(h===1&&a===0) return 1+la*rho;
  if(h===0&&a===1) return 1+lh*rho;
  if(h===1&&a===1) return 1-rho;
  return 1;
}

async function cfetch(url, opts={}, cacheMs=0, timeoutMs=10000){
  const ck = 'fc_'+btoa(encodeURIComponent(url));
  if(cacheMs>0){
    try{
      const c=sessionStorage.getItem(ck);
      if(c){const {d,t}=JSON.parse(c);if(Date.now()-t<cacheMs)return d;}
    }catch(e){}
  }
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
  try{
    const r=await fetch(url,{...opts,signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    if(cacheMs>0) try{sessionStorage.setItem(ck,JSON.stringify({d:data,t:Date.now()}));}catch(e){}
    return data;
  }catch(e){
    clearTimeout(tid);
    if(e.name==='AbortError') throw new Error(`Timeout after ${timeoutMs}ms`);
    throw e;
  }
}

function withTimeout(promise, ms=10000){
  return Promise.race([
    promise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error(`Timeout after ${ms}ms`)),ms))
  ]);
}

// Football-specific multi-market fetch: one call per market type to avoid 422.
// Merges all bookmaker market arrays onto a single pseudo-event object.
const FOOTBALL_MARKET_GROUPS = [
  'h2h',
  'btts',
  'totals',
  'alternate_totals',
  'draw_no_bet',
  'h2h_laying',
  'player_goal_scorer_anytime',
  'player_goal_scorer_first',
];

async function fetchFootballMultiMarkets(eventId, oddsKey){
  const regions = oddsRegions();
  const base = `${CFG.oddsBase}/sports/${oddsKey}/events/${eventId}/odds`;
  const params = `apiKey=${CFG.oddsKey}&regions=${regions}&oddsFormat=decimal`;

  // Prefer exact ID match — team-name fallback can pull a different leg of the same fixture
  const cached = ST.events.find(e=>e.id===eventId)
    || ST.events.find(e=>e.home_team===ST.match?.home_team && e.away_team===ST.match?.away_team);
  console.log(`[multiMarkets] seed cache: id=${cached?.id} home=${cached?.home_team} away=${cached?.away_team} books=${cached?.bookmakers?.length??0}`);

  // bookmakerMap: key → {key, title, markets:[]}
  const bookmakerMap = new Map();

  function mergeInto(data){
    if(!data?.bookmakers?.length) return;
    for(const bk of data.bookmakers){
      if(!bookmakerMap.has(bk.key)){
        bookmakerMap.set(bk.key, {key:bk.key, title:bk.title, markets:[]});
      }
      const existing = bookmakerMap.get(bk.key);
      for(const mkt of (bk.markets||[])){
        // Only add if not already present (avoid dups from h2h appearing in multiple calls)
        if(!existing.markets.find(m=>m.key===mkt.key)){
          existing.markets.push(mkt);
        }
      }
    }
  }

  // Seed with cached h2h data so we don't waste a quota call on it
  if(cached?.bookmakers?.length) mergeInto(cached);

  // Fetch each group in parallel, skip h2h if already cached
  const groupsToFetch = cached?.bookmakers?.length
    ? FOOTBALL_MARKET_GROUPS.filter(g=>g!=='h2h')
    : FOOTBALL_MARKET_GROUPS;

  const results = await Promise.allSettled(
    groupsToFetch.map(mkt =>
      cfetch(`${base}?${params}&markets=${mkt}`,{},0,12000)
        .catch(e=>{ console.warn(`[OddsAPI] ${mkt} failed:`,e.message); return null; })
    )
  );

  const FR_KEYS=['winamax_fr','betclic_fr','unibet_fr','pmu_fr'];

  results.forEach((r,i)=>{
    const grp=groupsToFetch[i];
    if(r.status==='fulfilled'&&r.value){
      // Per-call debug: show what each FR book returned for this market group
      const frRaw=(r.value?.bookmakers||[])
        .filter(b=>FR_KEYS.includes(b.key))
        .map(b=>{
          const mkts=(b.markets||[]).map(m=>
            m.key+'['+(m.outcomes||[]).map(o=>`${o.name}${o.point!=null?'('+o.point+')':''}@${o.price}`).join('|')+']'
          );
          return b.key+': '+mkts.join('; ');
        });
      console.log(`[OddsAPI] ${grp} raw FR →`, frRaw.length?frRaw:'(no FR books)');
      mergeInto(r.value);
    } else if(r.status==='rejected'){
      console.warn(`[OddsAPI] market group ${grp}:`,r.reason?.message);
    }
  });

  const merged = {
    ...(cached||{}),
    bookmakers: [...bookmakerMap.values()],
  };

  // Final summary: show exactly what h2h odds each FR book has after all merges
  console.group('[OddsAPI] multiMarkets — final FR h2h odds');
  for(const bkKey of FR_KEYS){
    const bk=bookmakerMap.get(bkKey);
    if(!bk) continue;
    const h2hMkt=bk.markets.find(m=>m.key==='h2h');
    const totMkt=bk.markets.find(m=>m.key==='totals');
    if(h2hMkt) console.log(`${bkKey} h2h:`, h2hMkt.outcomes.map(o=>`${o.name}@${o.price}`).join(', '));
    if(totMkt) console.log(`${bkKey} totals:`, totMkt.outcomes.map(o=>`${o.name}(${o.point})@${o.price}`).join(', '));
  }
  console.groupEnd();

  console.log(`[OddsAPI] multiMarkets merged: ${merged.bookmakers.length} bookmakers, market keys:`,
    [...new Set(merged.bookmakers.flatMap(b=>b.markets.map(m=>m.key)))]);
  return merged;
}

    // Stats snapshot
    const homeS=(f.statistics||[]).find(s=>s.team?.id===f.teams?.home?.id)?.statistics||[];
    const awayS=(f.statistics||[]).find(s=>s.team?.id===f.teams?.away?.id)?.statistics||[];
    const gs=(arr,t)=>arr.find(s=>s.type===t)?.value??null;
    return{
      match_id:String(f.fixture?.id),
      home_goals:hg, away_goals:ag, result,
      btts:hg>0&&ag>0, over25:(hg+ag)>2.5,
      halftime_home:f.score?.halftime?.home, halftime_away:f.score?.halftime?.away,
      penalty_home:f.score?.penalty?.home??null, penalty_away:f.score?.penalty?.away??null,
      goalscorers:goalscorers.length?goalscorers:null,
      stats_poss_home:gs(homeS,'Ball Possession'), stats_poss_away:gs(awayS,'Ball Possession'),
      stats_xg_home:gs(homeS,'expected_goals'), stats_xg_away:gs(awayS,'expected_goals'),
      stats_shots_home:gs(homeS,'Total Shots'), stats_shots_away:gs(awayS,'Total Shots'),
    };
  });
  // Try full upsert first; fall back to base fields only if table lacks extended columns
  try{
    await sbUpsert('results',rows,'match_id');
  }catch(e){
    console.warn('[RapidAPI] full upsert failed (missing columns?), retrying base fields only:',e.message);
    const base=rows.map(({match_id,home_goals,away_goals,result,btts,over25})=>({match_id,home_goals,away_goals,result,btts,over25}));
    await sbUpsert('results',base,'match_id');
  }
  console.log(`[RapidAPI] ✓ ${rows.length} results saved to Supabase`);
  console.groupEnd();

  // Match saved results to local predictions and trigger calibration
  calcCalibration().catch(e=>console.warn('[calibration]',e.message));
  return rows;
}

function sbHeaders(extra={}){
  return{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json',...extra};
}
async function sbInsert(table,data){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:sbHeaders({'Prefer':'return=minimal'}),body:JSON.stringify(data)});
  if(!r.ok) throw new Error(`sb insert ${table}: ${r.status} ${await r.text()}`);
}
async function sbUpsert(table,data,onConflict){
  const url=`${SB_URL}/rest/v1/${table}${onConflict?'?on_conflict='+onConflict:''}`;
  const r=await fetch(url,{method:'POST',headers:sbHeaders({'Prefer':'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify(Array.isArray(data)?data:[data])});
  if(!r.ok) throw new Error(`sb upsert ${table}: ${r.status} ${await r.text()}`);
}
async function sbSelect(table,qs=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${qs}`,{headers:sbHeaders()});
  if(!r.ok) throw new Error(`sb select ${table}: ${r.status}`);
  return r.json();
}

async function savePrediction(markets,matrix,lambda,oddsData){
  if(!matrix||!ST.match) return;
  try{
    const p=calc1X2fromMatrix(matrix);
    const btts=calcBTTSfromMatrix(matrix);
    const o25=calcTotalsFromMatrix(matrix,2.5);
    const thr=evThreshold();
    const valueBets=markets.filter(m=>m.frBestOdds&&m.frEV!=null&&m.frEV>=thr).map(m=>({
      market:m.name,outcome:m.outcome||m.name,ourProb:m.ourProb,
      frBestOdds:m.frBestOdds,frBestBook:m.frBestBook,frEV:m.frEV,kelly:m.kelly,
    }));
    const q=oddsData?.bookmakers?.length?oddsTo1X2Probs(oddsData.bookmakers):null;
    const conf=getConfederation(ST.match.home_team)!=='OTHER'?getConfederation(ST.match.home_team):getConfederation(ST.match.away_team);
    await sbUpsert('predictions',{
      match_id:ST.match.id,home_team:ST.match.home_team,away_team:ST.match.away_team,
      match_date:ST.match.commence_time,competition:ST.league?.name||'Unknown',
      home_win_prob:p.home,draw_prob:p.draw,away_win_prob:p.away,
      btts_prob:btts.yes,over25_prob:o25.over,
      lambda_home:lambda?.home,lambda_away:lambda?.away,
      value_bets:valueBets,
      bookmaker_odds:q?{probHome:q.probHome,probDraw:q.probDraw,probAway:q.probAway}:null,
      confederation:conf,
    },'match_id');
    console.log('[Supabase] ✓ prediction saved:',ST.match.home_team,'vs',ST.match.away_team);
  }catch(e){ console.warn('[Supabase] save prediction failed:',e.message); }
}

async function calcCalibration(){
  try{
    const preds=await sbSelect('predictions','select=match_id,home_team,away_team,home_win_prob,draw_prob,away_win_prob,btts_prob,over25_prob,value_bets,confederation');
    const results=await sbSelect('results','select=match_id,result,btts,over25');
    const resMap=new Map(results.map(r=>[r.match_id,r]));
    const joined=preds.filter(p=>resMap.has(p.match_id)).map(p=>({...p,...resMap.get(p.match_id)}));
    if(!joined.length) return;
    const groups={};
    joined.forEach(m=>{ const c=m.confederation||'OTHER'; (groups[c]=groups[c]||[]).push(m); });
    const rows=[];
    for(const[conf,ms] of Object.entries(groups)){
      if(ms.length<3) continue;
      let bs=0;
      ms.forEach(m=>{
        const h=m.result==='H'?1:0, d=m.result==='D'?1:0, a=m.result==='A'?1:0;
        bs+=(m.home_win_prob-h)**2+(m.draw_prob-d)**2+(m.away_win_prob-a)**2;
      });
      const brierScore=bs/ms.length;
      let tStake=0, tRet=0;
      ms.forEach(m=>{
        (m.value_bets||[]).forEach(b=>{
          if(!b.kelly||!b.frBestOdds) return;
          const stake=b.kelly*(CFG.bankroll||1000);
          tStake+=stake;
          const oc=(b.outcome||'').toLowerCase();
          const won=(oc.includes((m.home_team||'').toLowerCase().split(' ').pop())&&m.result==='H')
            ||(oc.includes('draw')&&m.result==='D')
            ||(oc.includes((m.away_team||'').toLowerCase().split(' ').pop())&&m.result==='A')
            ||(oc==='yes'&&m.btts)||(oc.includes('over')&&m.over25);
          if(won) tRet+=stake*b.frBestOdds;
        });
      });
      const roi=tStake>0?(tRet-tStake)/tStake:null;
      const factor=Math.max(0.7,Math.min(1.3,1-(brierScore-0.2)*0.5));
      rows.push({confederation:conf,brier_score:brierScore,roi,factor,sample_count:ms.length,updated_at:new Date().toISOString()});
    }
    if(rows.length) await sbUpsert('calibration',rows,'confederation');
    ST.calibration=Object.fromEntries(rows.map(r=>[r.confederation,r.factor]));
    console.log('[calibration] updated:',ST.calibration);
  }catch(e){ console.warn('[calibration] error:',e.message); }
}

async function updateCalibrationFromBacktest(results){
  const groups={};
  results.forEach(r=>{ const c=r.confederation||'OTHER'; (groups[c]=groups[c]||[]).push(r); });
  const rows=[];
  for(const[conf,ms] of Object.entries(groups)){
    if(ms.length<3) continue;
    const avgBrier=ms.reduce((s,m)=>s+m.brier_score,0)/ms.length;
    const bttsAcc=ms.filter(m=>m.actual_btts===m.pred_btts_bool).length/ms.length;
    const o25Acc=ms.filter(m=>m.actual_over25===m.pred_over25_bool).length/ms.length;
    // Factor: shrink λ if model overestimates (Brier > 0.22 baseline for 3-outcome)
    const factor=Math.max(0.7,Math.min(1.3,1-(avgBrier-0.22)*0.5));
    rows.push({confederation:conf,brier_score:avgBrier,roi:null,factor,sample_count:ms.length,updated_at:new Date().toISOString()});
  }
  if(rows.length){
    await sbUpsert('calibration',rows,'confederation');
    ST.calibration=Object.fromEntries(rows.map(r=>[r.confederation,r.factor]));
    console.log('[backtest] calibration updated from WC 2022:',ST.calibration);
  }
  return rows;
}

async function runBacktest2022(){
  const btn=$('btn-backtest');
  const body=$('stats-body');
  if(btn){ btn.textContent='⏳ Fetching 59 WC 2022 matches...'; btn.disabled=true; }
  try{
    // 1. Fetch all WC 2022 completed fixtures
    const url='https://v3.football.api-sports.io/fixtures?league=1&season=2022&status=FT';
    const d=await cfetch(url,{headers:sportsHeaders()},36e5);
    const fixtures=d?.response||[];
    if(!fixtures.length) throw new Error('No WC 2022 fixtures returned');
    if(btn) btn.textContent=`⏳ Running model on ${fixtures.length} matches...`;

    // 2. Run Poisson model for each match using pre-tournament qualifying stats
    const rows=[];
    let missing=[];
    for(const f of fixtures){
      const hName=f.teams?.home?.name, aName=f.teams?.away?.name;
      const hS=lookupTeamStats2022(hName), aS=lookupTeamStats2022(aName);
      if(!hS||!aS){ missing.push(`${hName} vs ${aName}`); continue; }
      const lambda=calcLambdaBacktest(hS.gf,hS.ga,aS.gf,aS.ga);
      const matrix=correctScoreMatrix(lambda.home,lambda.away);
      const pred=calc1X2fromMatrix(matrix);
      const btts=calcBTTSfromMatrix(matrix);
      const o25=calcTotalsFromMatrix(matrix,2.5);
      const hg=f.goals?.home??0, ag=f.goals?.away??0;
      const actualResult=hg>ag?'H':ag>hg?'A':'D';
      const actualBTTS=hg>0&&ag>0, actualO25=(hg+ag)>2.5;
      const h=actualResult==='H'?1:0, dv=actualResult==='D'?1:0, a=actualResult==='A'?1:0;
      const brier=((pred.home-h)**2+(pred.draw-dv)**2+(pred.away-a)**2)/3;
      const conf=hS.conf||aS.conf||'OTHER';
      // Simulate €10 flat-stake value bet: bet if model prob > implied+3%
      // Without real 2022 odds we use model prob as "fair odds" baseline for ROI sim
      rows.push({
        match_id:String(f.fixture?.id),
        home_team:hName,away_team:aName,
        match_date:f.fixture?.date?.slice(0,10),
        league_round:f.league?.round,
        pred_home:pred.home,pred_draw:pred.draw,pred_away:pred.away,
        pred_btts:btts.yes,pred_over25:o25.over,
        pred_btts_bool:btts.yes>=0.5,pred_over25_bool:o25.over>=0.5,
        actual_result:actualResult,actual_goals_home:hg,actual_goals_away:ag,
        actual_btts:actualBTTS,actual_over25:actualO25,
        brier_score:brier,lambda_home:lambda.home,lambda_away:lambda.away,
        confederation:conf,
      });
    }
    if(missing.length) console.warn('[backtest] missing stats for:',missing.join(', '));
    if(!rows.length) throw new Error('No results — check TEAM_STATS_2022 coverage');

    // 3. Upsert to Supabase
    if(btn) btn.textContent=`⏳ Saving ${rows.length} results to Supabase...`;
    await sbUpsert('backtest_results',rows,'match_id');
    console.log(`[backtest] ✓ saved ${rows.length} results`);

    // 4. Update confederation calibration factors
    const calRows=await updateCalibrationFromBacktest(rows);
    console.log('[backtest] ✓ calibration updated');

    // 5. Refresh stats display
    await showStats();
  }catch(e){
    console.error('[backtest]',e.message);
    if(body) body.insertAdjacentHTML('afterbegin',`<div style="color:var(--red);padding:12px;margin-bottom:16px;background:rgba(255,0,0,0.1);border-radius:var(--r3)">Backtest error: ${e.message}<br><span style="font-size:11px;color:var(--text3)">Make sure the backtest_results table exists in Supabase (see SQL below)</span></div>`);
  }finally{
    if(btn){ btn.textContent='🔄 Run WC 2022 Backtest'; btn.disabled=false; }
  }
}

          const factor=ST.calibration[c]?ST.calibration[c].toFixed(3):'1.000';
          return`<tr><td style="padding:6px 10px;font-weight:600">${c}</td><td style="padding:6px 10px">${ms.length}</td><td style="padding:6px 10px">${ab}</td><td style="padding:6px 10px">${acc}%</td><td style="padding:6px 10px;color:var(--gold)">${factor}</td></tr>`;
        }).join('');
        const worst=bt.slice().sort((a,b)=>b.brier_score-a.brier_score).slice(0,3);
        const best=bt.slice().sort((a,b)=>a.brier_score-b.brier_score).slice(0,3);
        return`
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px">
          <div style="background:var(--bg3);border-radius:var(--r3);padding:14px;text-align:center">
            <div style="font-size:22px;font-weight:900;color:${brierColor}">${avgBrier}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:3px">Brier Score<br><span style="color:var(--text3)">baseline: ${baseline}</span></div>
          </div>
          <div style="background:var(--bg3);border-radius:var(--r3);padding:14px;text-align:center">
            <div style="font-size:22px;font-weight:900">${h1x2}%</div>
            <div style="font-size:11px;color:var(--text3);margin-top:3px">1X2 Most Likely<br>Accuracy</div>
          </div>
          <div style="background:var(--bg3);border-radius:var(--r3);padding:14px;text-align:center">
            <div style="font-size:22px;font-weight:900">${bttsAcc}%</div>
            <div style="font-size:11px;color:var(--text3);margin-top:3px">BTTS Accuracy<br>(Yes/No)</div>
          </div>
          <div style="background:var(--bg3);border-radius:var(--r3);padding:14px;text-align:center">
            <div style="font-size:22px;font-weight:900">${o25Acc}%</div>
            <div style="font-size:11px;color:var(--text3);margin-top:3px">Over 2.5<br>Accuracy</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px">
          <div>
            <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--green)">Best Predictions</div>
            ${best.map(m=>`<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)">${m.home_team} ${m.actual_goals_home}-${m.actual_goals_away} ${m.away_team} <span style="color:var(--text3)">(Brier ${m.brier_score.toFixed(3)})</span></div>`).join('')}
          </div>
          <div>
            <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--red)">Hardest Matches</div>
            ${worst.map(m=>`<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)">${m.home_team} ${m.actual_goals_home}-${m.actual_goals_away} ${m.away_team} <span style="color:var(--text3)">(Brier ${m.brier_score.toFixed(3)})</span></div>`).join('')}
          </div>
        </div>
        <div style="font-size:12px;font-weight:700;margin-bottom:8px">By Confederation <span style="font-weight:400;color:var(--text3)">(λ factors now applied to 2026 predictions)</span></div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:12px">
            <thead><tr style="border-bottom:1px solid var(--border)"><th style="padding:6px 10px;text-align:left">Conf</th><th style="padding:6px 10px">Matches</th><th style="padding:6px 10px">Brier</th><th style="padding:6px 10px">1X2 Acc</th><th style="padding:6px 10px;color:var(--gold)">λ Factor</th></tr></thead>
            <tbody>${confRows}</tbody>
          </table>
        </div>`;
      })()}
    </div>`:`
    <div style="margin-top:24px;padding:16px;background:var(--bg3);border-radius:var(--r3);border:1px dashed var(--border)">
      <div style="font-size:13px;font-weight:700;margin-bottom:6px">No backtest data yet</div>
      <div style="font-size:12px;color:var(--text3)">Click <strong>🔄 Run WC 2022 Backtest</strong> to run the model on all 59 WC 2022 matches and calibrate confederation factors. Requires the <code>backtest_results</code> table in Supabase.</div>
    </div>`}
    ${joined.filter(j=>!j.res).length?`
    <div style="margin-top:24px;padding:16px;background:var(--bg3);border-radius:var(--r3);border:1px solid var(--border)">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px">Enter WC 2026 Result <span style="font-size:11px;font-weight:400;color:var(--text3)">(API-Sports free plan can't fetch 2026 season data)</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <select id="sb-match-sel" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:var(--r3);font-size:13px;flex:1;min-width:200px">
          ${joined.filter(j=>!j.res).map(j=>`<option value="${j.match_id}|${j.home_team}|${j.away_team}">${j.home_team} vs ${j.away_team} (${j.match_date?.slice(0,10)||'?'})</option>`).join('')}
        </select>
        <input id="sb-hg" type="number" min="0" placeholder="Home" style="width:64px;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:7px;border-radius:var(--r3);text-align:center">
        <span style="color:var(--text3)">–</span>
        <input id="sb-ag" type="number" min="0" placeholder="Away" style="width:64px;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:7px;border-radius:var(--r3);text-align:center">
        <button onclick="submitManualResult()" style="background:var(--orange);color:#fff;border:none;padding:7px 18px;border-radius:var(--r3);font-weight:700;cursor:pointer">Save</button>
      </div>
      <div id="sb-result-msg" style="font-size:12px;margin-top:8px;color:var(--text3)"></div>
    </div>`:''}
    `;
  }catch(e){
    body.innerHTML=`<div style="color:var(--red);padding:20px">Error loading stats: ${e.message}</div>`;
  }
}

async function syncWC2026(){
  const btn=$('btn-sync2026');
  if(btn){ btn.textContent='⏳ Syncing...'; btn.disabled=true; }
  const body=$('stats-body');
  try{
    const rows=WC2026_RESULTS.map(({id,home,away,hg,ag})=>({
      match_id:id, home_team:home, away_team:away,
      home_goals:hg, away_goals:ag,
      result:hg>ag?'H':ag>hg?'A':'D',
      btts:hg>0&&ag>0, over25:(hg+ag)>2.5,
    }));
    await sbUpsert('results',rows,'match_id');
    calcCalibration().catch(e=>console.warn('[calibration]',e.message));
    const msg=`<div style="padding:10px 14px;background:rgba(0,200,100,0.1);border:1px solid var(--green);border-radius:var(--r3);font-size:13px;color:var(--green);margin-bottom:16px">✓ Saved ${rows.length} WC 2026 results to Supabase</div>`;
    await showStats();
    body.insertAdjacentHTML('afterbegin',msg);
  }catch(e){
    console.error('[sync2026]',e.message);
    body.insertAdjacentHTML('afterbegin',`<div style="padding:10px 14px;background:rgba(255,0,0,0.1);border:1px solid var(--red);border-radius:var(--r3);font-size:13px;color:var(--red);margin-bottom:16px">Error: ${e.message}</div>`);
  }finally{
    if(btn){ btn.textContent='⚡ Sync WC 2026'; btn.disabled=false; }
  }
}
async function submitManualResult(){
  const sel=$('sb-match-sel'); const msg=$('sb-result-msg');
  const hg=$('sb-hg').value; const ag=$('sb-ag').value;
  if(!sel||hg===''||ag===''){msg.textContent='Fill in both scores.';return;}
  const[matchId,homeTeam,awayTeam]=sel.value.split('|');
  msg.textContent='Saving...';
  await saveMatchResult(matchId,homeTeam,awayTeam,hg,ag);
  msg.style.color='var(--green)';
  msg.textContent=`✓ ${homeTeam} ${hg}–${ag} ${awayTeam} saved. Refreshing stats...`;
  setTimeout(()=>showStats(),1200);
}

async function fetchFixtures(type, leagueId, season){
  const base = CFG.sportsBase[type] || CFG.sportsBase.football;
  const today = new Date().toISOString().split('T')[0];
  const future = new Date(Date.now()+14*864e5).toISOString().split('T')[0];
  const url = `https://${base}/fixtures?league=${leagueId}&season=${season}&from=${today}&to=${future}&status=NS`;
  try{ return await cfetch(url,{headers:sportsHeaders()},6e5); }
  catch(e){ console.warn('API-Sports fixtures:',e.message); return null; }
}

async function fetchTeamStats(type, teamId, leagueId, season){
  const base = CFG.sportsBase[type] || CFG.sportsBase.football;
  const url = `https://${base}/teams/statistics?team=${teamId}&league=${leagueId}&season=${season}`;
  try{ return await cfetch(url,{headers:sportsHeaders()},18e5); }
  catch(e){ console.warn('Team stats:',e.message); return null; }
}

async function fetchH2H(type, t1, t2){
  const base = CFG.sportsBase[type] || CFG.sportsBase.football;
  const url = `https://${base}/fixtures/headtohead?h2h=${t1}-${t2}&last=5`;
  try{ return await cfetch(url,{headers:sportsHeaders()},36e5); }
  catch(e){ console.warn('H2H:',e.message); return null; }
}

async function fetchTeamPlayers(type, teamId){
  if(type==='basketball'){
    // use balldontlie for NBA
    try{
      const url=`${CFG.bdl}/players?team_ids[]=${teamId}&per_page=15`;
      const d=await cfetch(url,{},36e5);
      return d.data||[];
    }catch(e){ return []; }
  }
  const base = CFG.sportsBase[type] || CFG.sportsBase.football;
  const url = `https://${base}/players?team=${teamId}&season=${getSeasonForType(type)}`;
  try{
    const d=await cfetch(url,{headers:sportsHeaders()},36e5);
    return d.response||[];
  }catch(e){ return []; }
}

async function fetchStandings(type, leagueId, season){
  const base = CFG.sportsBase[type] || CFG.sportsBase.football;
  const ep = type==='football'?'standings':type==='basketball'?'standings':'standings';
  const url = `https://${base}/${ep}?league=${leagueId}&season=${season}`;
  try{ return await cfetch(url,{headers:sportsHeaders()},36e5); }
  catch(e){ return null; }
}

function getSeasonForType(type){
  const m={football:2025,basketball:'2025-2026',nfl:2025,hockey:'2025-2026',baseball:2026};
  return m[type]||2025;
}

function lookupLast5(teamName){
  if(LAST_5_MATCHES[teamName]) return LAST_5_MATCHES[teamName];
  const lower=teamName.toLowerCase();
  const key=Object.keys(LAST_5_MATCHES).find(k=>k.toLowerCase()===lower||lower.includes(k.toLowerCase())||k.toLowerCase().includes(lower));
  return key?LAST_5_MATCHES[key]:null;
}

function formRating(matches){
  if(!matches||!matches.length) return null;
  const pts=matches.reduce((s,m)=>s+(m.result==='W'?3:m.result==='D'?1:0),0);
  const max=matches.length*3;
  return pts/max; // 0-1
}

// Generic fuzzy lookup against any {name: {gf,ga}} table
function lookupFromTable(table, rawName){
  if(!rawName) return null;
  if(table[rawName]) return table[rawName];
  const lower=rawName.toLowerCase();
  const exact=Object.keys(table).find(k=>k.toLowerCase()===lower);
  if(exact) return table[exact];
  const partial=Object.keys(table).find(k=>{
    const kl=k.toLowerCase();
    return lower.includes(kl)||kl.includes(lower);
  });
  return partial?table[partial]:null;
}

// Lookup opponents array by name (fuzzy match against QUAL_OPPONENTS keys)
function lookupOpponents(teamName){
  if(!teamName) return null;
  if(QUAL_OPPONENTS[teamName]) return QUAL_OPPONENTS[teamName];
  const lower=teamName.toLowerCase();
  const key=Object.keys(QUAL_OPPONENTS).find(k=>{
    const kl=k.toLowerCase();
    return kl===lower||lower.includes(kl)||kl.includes(lower);
  });
  return key?QUAL_OPPONENTS[key]:null;
}

// Average strength of opponents; teams missing from TEAM_STRENGTH default to 45
function calcSOS(opponents){
  if(!opponents||!opponents.length) return null;
  const strengths=opponents.map(op=>TEAM_STRENGTH[op]??45);
  return strengths.reduce((s,v)=>s+v,0)/strengths.length;
}

// Blend qualifying campaign avg (40%) + recent 2025 form (60%), then apply SOS
function blendedStats(teamName){
  const qual=lookupFromTable(WC_TEAM_STATS, teamName);
  const recent=lookupFromTable(RECENT_FORM, teamName);

  let gf, ga, source;
  if(qual && recent){
    gf=0.4*qual.gf+0.6*recent.gf;
    ga=0.4*qual.ga+0.6*recent.ga;
    source='WC Qual (40%) + Recent Form (60%)';
  } else if(qual){
    gf=qual.gf; ga=qual.ga; source='WC Qualifying (static)';
  } else if(recent){
    gf=recent.gf; ga=recent.ga; source='Recent Form (last 5)';
  } else {
    return null;
  }

  // SOS adjustment
  const opponents=lookupOpponents(teamName);
  const sos=calcSOS(opponents);
  if(sos!==null){
    let gfFactor=1.0, gaFactor=1.0, sosTag='';
    if(sos<60){
      gfFactor=0.90; gaFactor=1.10; sosTag=' [SOS↓ weak opp]';
    } else if(sos>70){
      gfFactor=1.10; gaFactor=0.90; sosTag=' [SOS↑ strong opp]';
    }
    console.log(`[SOS] ${teamName}: avg_opp=${sos.toFixed(1)} → gf×${gfFactor} ga×${gaFactor}`);
    gf*=gfFactor; ga*=gaFactor; source+=sosTag;
  }

  return {gf:+gf.toFixed(3), ga:+ga.toFixed(3), source};
}

function lookupWCStats(rawName){ return blendedStats(rawName); }

const H2H_ALIASES = {
  'USA':'United States','United States':'United States',
  'Korea Republic':'South Korea','South Korea':'South Korea',
  'IR Iran':'Iran','Türkiye':'Turkey','Republic of Ireland':'Ireland',
};

function normalizeH2HName(name){
  return H2H_ALIASES[name]||name;
}

function lookupH2H(team1, team2){
  const a=normalizeH2HName(team1), b=normalizeH2HName(team2);
  const keyAB=`${a}_vs_${b}`;
  const keyBA=`${b}_vs_${a}`;
  return H2H_DATA[keyAB]||H2H_DATA[keyBA]||null;
}

function calcH2HAdjustment(team1, team2){
  const meetings=lookupH2H(team1, team2);
  if(!meetings||!meetings.length) return {h2h:null, adj1:1.0, adj2:1.0};
  const a=normalizeH2HName(team1), b=normalizeH2HName(team2);
  let w1=0, d=0, w2=0;
  for(const m of meetings){
    const ht=normalizeH2HName(m.homeTeam), at=normalizeH2HName(m.awayTeam);
    const isTeam1Home=(ht===a)||(at===b);
    const hWin=m.homeGoals>m.awayGoals, aWin=m.awayGoals>m.homeGoals, draw=m.homeGoals===m.awayGoals;
    if(draw){ d++; }
    else if((isTeam1Home&&hWin)||(!isTeam1Home&&aWin)){ w1++; }
    else { w2++; }
  }
  const total=meetings.length;
  let adj1=1.0, adj2=1.0;
  if(w1>=4){ adj1=1.05; adj2=0.95; }
  else if(w2>=4){ adj1=0.95; adj2=1.05; }
  return {h2h:meetings, w1, d, w2, total, adj1, adj2, dominantTeam: w1>=4?a: w2>=4?b: null};
}

// Fetch last-5 completed matches from API-Sports for a team.
// Free plan: season 2026 and `last=N` are blocked. We use season=2024 (includes
// WC 2026 qualifiers through Nov 2025) and sort to get the most recent 5 FT matches.
async function fetchTeamLast5(teamName){
  if(!CFG.sportsKey) return null;
  try{
    const team=await fetchWCTeamByName(teamName);
    if(!team?.id){ console.warn(`[form] no ID for "${teamName}"`); return null; }
    console.log(`[form] "${teamName}" resolved to id=${team.id} name="${team.name}"`);
    if(_fetchedTeamIds.has(team.id)){
      const prev=_fetchedTeamIds.get(team.id);
      console.error(`[form] ID collision! id=${team.id} already used for "${prev}" — returning null for "${teamName}"`);
      return null;
    }
    _fetchedTeamIds.set(team.id, teamName);
    const url=`https://v3.football.api-sports.io/fixtures?team=${team.id}&season=2024&status=FT`;
    console.log(`[form] fetching fixtures for "${teamName}" id=${team.id} → ${url}`);
    const d=await cfetch(url,{headers:sportsHeaders()},18e5);
    const raw=(d?.response||[]).filter(f=>f.goals?.home!=null&&f.goals?.away!=null);
    // Keep only fixtures where the requested team actually played
    const all=raw.filter(f=>f.teams?.home?.id===team.id||f.teams?.away?.id===team.id);
    if(raw.length!==all.length)
      console.warn(`[form] filtered out ${raw.length-all.length} fixtures where id=${team.id} didn't appear`);
    if(!all.length){ console.warn(`[form] no scored fixtures for "${teamName}" in season 2024`); return null; }
    // Sanity check: first fixture should contain this team by name
    const first=all[0]; const hn=first.teams?.home?.name||'', an=first.teams?.away?.name||'';
    const nameMatch=hn.toLowerCase().includes(team.name.toLowerCase())||an.toLowerCase().includes(team.name.toLowerCase())||
                    team.name.toLowerCase().includes(hn.toLowerCase())||team.name.toLowerCase().includes(an.toLowerCase());
    if(!nameMatch){
      console.warn(`[form] data mismatch for "${teamName}": fixture shows "${hn}" vs "${an}" but resolved id=${team.id} as "${team.name}" — returning null`);
      return null;
    }
    // Sort descending by date, take 5 most recent
    const sorted=[...all].sort((a,b)=>new Date(b.fixture.date)-new Date(a.fixture.date));
    const fixtures=sorted.slice(0,5);
    const matches=fixtures.map(f=>{
      const isHome=f.teams?.home?.id===team.id;
      const gf=isHome?(f.goals.home??0):(f.goals.away??0);
      const ga=isHome?(f.goals.away??0):(f.goals.home??0);
      return{
        opponent:isHome?f.teams.away?.name:f.teams.home?.name,
        gf,ga,
        result:gf>ga?'W':gf<ga?'L':'D',
        comp:f.league?.name||'',
        date:f.fixture?.date?.slice(0,10)||'',
      };
    });
    console.log(`[form] ✓ ${teamName} (season 2024, last ${matches.length}):`,matches.map(m=>`${m.result} vs ${m.opponent} ${m.gf}-${m.ga}`).join(' | '));
    return matches;
  }catch(e){ console.warn(`[form] error for "${teamName}":`,e.message); return null; }
}

function calcWCLambda(homeResult, awayResult, oddsData){
  // homeResult / awayResult are either {stats, source} objects or null
  const homeStats = homeResult?.stats ?? homeResult;
  const awayStats = awayResult?.stats ?? awayResult;
  const hSource   = homeResult?.source || null;
  const aSource   = awayResult?.source || null;

  // International avg: ~1.25 goals per team per game at major tournaments
  const leagueAvg=1.25;

  function gFor(s){
    return parseFloat(s?.goals?.for?.average?.total||s?.goals?.for?.average?.away||s?.goals?.for?.average?.home||0);
  }
  function gAga(s){
    return parseFloat(s?.goals?.against?.average?.total||s?.goals?.against?.average?.away||s?.goals?.against?.average?.home||0);
  }

  const hFor=gFor(homeStats)||leagueAvg;
  const hAga=gAga(homeStats)||leagueAvg;
  const aFor=gFor(awayStats)||leagueAvg;
  const aAga=gAga(awayStats)||leagueAvg;

  // Strength ratings normalised to league avg
  const hAtk=hFor/leagueAvg; const hDef=hAga/leagueAvg;
  const aAtk=aFor/leagueAvg; const aDef=aAga/leagueAvg;

  // All WC matches at neutral venues → no home advantage
  let lh=clamp(hAtk*aDef*leagueAvg, 0.3, 4.0);
  let la=clamp(aAtk*hDef*leagueAvg, 0.3, 4.0);

  const hName=ST.match?.home_team||'Home';
  const aName=ST.match?.away_team||'Away';
  console.group('[WC] calcWCLambda');
  console.log(`Data sources   — ${hName}: ${hSource||'none (using avg)'} | ${aName}: ${aSource||'none (using avg)'}`);
  console.log(`Goals scored   — ${hName}: ${hFor.toFixed(2)}/game | ${aName}: ${aFor.toFixed(2)}/game`);
  console.log(`Goals conceded — ${hName}: ${hAga.toFixed(2)}/game | ${aName}: ${aAga.toFixed(2)}/game`);
  console.log(`Attack rating  — ${hName}: ${hAtk.toFixed(3)} | ${aName}: ${aAtk.toFixed(3)}`);
  console.log(`Defence rating — ${hName}: ${hDef.toFixed(3)} | ${aName}: ${aDef.toFixed(3)}`);
  console.log(`Lambda pre-cal — ${hName}: ${lh.toFixed(2)} | ${aName}: ${la.toFixed(2)}`);

  // Calibration: if model win prob diverges >20pp from bookmaker implied,
  // blend 20% model + 80% odds-implied (using Poisson binary-search inversion).
  let hSourceFinal=hSource||'league avg (fallback)';
  let aSourceFinal=aSource||'league avg (fallback)';
  if(oddsData?.bookmakers?.length){
    const q=oddsTo1X2Probs(oddsData.bookmakers);
    if(q){
      const mp=calc1X2fromMatrix(correctScoreMatrix(lh,la));
      const maxDiff=Math.max(Math.abs(mp.home-q.probHome), Math.abs(mp.away-q.probAway));
      console.log(`Calibration    — model H/A: ${(mp.home*100).toFixed(1)}%/${(mp.away*100).toFixed(1)}% | book H/A: ${(q.probHome*100).toFixed(1)}%/${(q.probAway*100).toFixed(1)}% | max diff: ${(maxDiff*100).toFixed(1)}pp`);
      if(maxDiff>0.10){
        const {home:olh, away:ola}=lambdaFromBookProbs(q.probHome, q.probDraw, q.probAway);
        lh=0.2*lh+0.8*olh;
        la=0.2*la+0.8*ola;
        hSourceFinal+=' [calibrated]';
        aSourceFinal+=' [calibrated]';
        console.log(`Calibrated     — λH: ${lh.toFixed(2)} λA: ${la.toFixed(2)} (20% model + 80% odds-implied via Poisson inversion)`);
      }
    }
  }
  // H2H historical adjustment: if one team won 4+ of last 5, ±5% on lambda
  const h2hAdj=calcH2HAdjustment(hName, aName);
  if(h2hAdj.dominantTeam){
    const boostedHome=(h2hAdj.dominantTeam===hName);
    lh=clamp(lh*(boostedHome?h2hAdj.adj1:h2hAdj.adj2), 0.3, 4.0);
    la=clamp(la*(boostedHome?h2hAdj.adj2:h2hAdj.adj1), 0.3, 4.0);
    console.log(`H2H adjustment — ${h2hAdj.dominantTeam} dominates (${h2hAdj.w1}W-${h2hAdj.d}D-${h2hAdj.w2}W) → λH:${lh.toFixed(2)} λA:${la.toFixed(2)}`);
  }

  // Confederation calibration factor (updated from Supabase after each result)
  const hConf=getConfederation(hName), aConf=getConfederation(aName);
  const hFactor=ST.calibration[hConf]||1, aFactor=ST.calibration[aConf]||1;
  if(hFactor!==1||aFactor!==1){
    lh=clamp(lh*hFactor,0.3,4.0); la=clamp(la*aFactor,0.3,4.0);
    console.log(`Calibration    — ${hConf}:×${hFactor.toFixed(3)} ${aConf}:×${aFactor.toFixed(3)} → λH:${lh.toFixed(2)} λA:${la.toFixed(2)}`);
  }

  console.log(`Lambda final   — ${hName}: ${lh.toFixed(2)} | ${aName}: ${la.toFixed(2)}`);
  console.groupEnd();

  // If both stats fell back to avg, prefer odds-implied lambda
  if(hFor===leagueAvg&&aFor===leagueAvg){
    const fallback=estimateLambdaFromOdds(oddsData);
    if(fallback){
      console.log('[WC] no real stats for either team — using odds-implied lambda fallback');
      return {...fallback, hSource:'odds-implied', aSource:'odds-implied'};
    }
  }
  return {home:lh, away:la, hSource:hSourceFinal, aSource:aSourceFinal};
}

/* ================================================================
   MLB — PROBABILITY MODEL
================================================================ */
function extractMLBRunsAvg(stats){
  if(!stats) return null;
  // API-Sports baseball: response.games.points.for/against.average
  // Try several known paths the API may return
  const rs =
    parseFloat(stats?.games?.points?.for?.average) ||
    parseFloat(stats?.points?.for?.average?.all)   ||
    parseFloat(stats?.points?.for?.average)         || 0;
  const ra =
    parseFloat(stats?.games?.points?.against?.average) ||
    parseFloat(stats?.points?.against?.average?.all)   ||
    parseFloat(stats?.points?.against?.average)         || 0;
  const wins =
    parseInt(stats?.games?.wins?.all?.total || stats?.games?.wins?.total || 0);
  const played =
    parseInt(stats?.games?.played?.all || stats?.games?.played || 1);
  return { rs: rs||4.5, ra: ra||4.5, winPct: played>0 ? wins/played : 0.5 };
}

// Bill James Pythagorean expectation (exponent 1.83 tuned for MLB)
function pythagorean(rs, ra, exp=1.83){
  if(rs<=0&&ra<=0) return 0.5;
  return Math.pow(rs,exp) / (Math.pow(rs,exp) + Math.pow(ra,exp));
}

// Log5 head-to-head win probability
function log5(pHome, pAway){
  const num = pHome * (1 - pAway);
  const den = num + pAway * (1 - pHome);
  return den===0 ? 0.5 : num/den;
}

// Abramowitz & Stegun normal CDF approximation (max err < 7.5e-8)
function normalCDF(x, mean=0, std=1){
  const z=(x-mean)/std;
  const t=1/(1+0.2316419*Math.abs(z));
  const poly=t*(0.319381530+t*(-0.356563782+t*(1.781477937+t*(-1.821255978+t*1.330274429))));
  const cdf=1-0.3989422804*Math.exp(-0.5*z*z)*poly;
  return z>=0?cdf:1-cdf;
}

function calcMLBModel(homeStats, awayStats){
  const h=extractMLBRunsAvg(homeStats);
  const a=extractMLBRunsAvg(awayStats);
  if(!h||!a) return null;

  // Pythagorean win% per team
  const hPyth = pythagorean(h.rs, h.ra);
  const aPyth = pythagorean(a.rs, a.ra);

  // Log5 head-to-head
  const baseHomeWin = log5(hPyth, aPyth);

  // MLB home-field advantage: ~54% win rate at home historically
  const homeAdj = 0.025;
  const homeWinProb = clamp(baseHomeWin + homeAdj, 0.05, 0.95);
  const awayWinProb = 1 - homeWinProb;

  // Expected total: blend both teams' RS+RA (regress toward league avg 9.0 runs/game)
  const leagueTotal = 9.0;
  const rawTotal = h.rs + a.rs;
  const expectedTotal = rawTotal * 0.8 + leagueTotal * 0.2;

  console.log('[MLB] model →', {
    homeRS:h.rs, homeRA:h.ra, awayRS:a.rs, awayRA:a.ra,
    hPyth:hPyth.toFixed(3), aPyth:aPyth.toFixed(3),
    homeWinProb:homeWinProb.toFixed(3), expectedTotal:expectedTotal.toFixed(2)
  });
  return { homeWinProb, awayWinProb, expectedTotal, h, a, hPyth, aPyth };
}

function mlbTotalProb(expectedTotal, line){
  // MLB totals follow a roughly Normal distribution; std dev ~2.5 runs
  const std = 2.5;
  // P(total > line): P(X > line + 0.5) since totals are integers
  const over  = clamp(1 - normalCDF(line + 0.5, expectedTotal, std), 0.03, 0.97);
  return { over, under: 1 - over };
}

function mlbRunLineProb(baseWinProb, line){
  // line is typically -1.5 (favourite) or +1.5 (dog)
  // Rough conversion: winning by 2+ is ~60% of all wins for MLB favourite
  if(line < 0){
    // -1.5: must win by 2+ (approx 60-65% of wins are by 2+ runs)
    return clamp(baseWinProb * 0.62, 0.03, 0.92);
  } else {
    // +1.5: win OR lose by exactly 1
    return clamp(baseWinProb + (1 - baseWinProb) * 0.38, 0.08, 0.97);
  }
}

function enrichMLBProbs(markets, model){
  if(!model) return;
  markets.forEach(m=>{
    if(m.ourProb!==null&&m.ourProb!==undefined) return;
    const isHome = m.outcome===ST.match?.home_team;
    const isAway = m.outcome===ST.match?.away_team;
    // Moneyline
    if(m.cat==='Main'&&m.id.startsWith('h2h_')){
      if(isHome) m.ourProb=model.homeWinProb;
      else if(isAway) m.ourProb=model.awayWinProb;
    }
    // Run line
    if(m.cat==='Main'&&m.id.startsWith('spreads_')&&m.line!=null){
      const base = isHome ? model.homeWinProb : isAway ? model.awayWinProb : null;
      if(base!==null) m.ourProb = mlbRunLineProb(base, m.line);
    }
    // Totals
    if(m.cat==='Totals'&&m.line!=null){
      const t=mlbTotalProb(model.expectedTotal, m.line);
      if(m.name.startsWith('Over'))  m.ourProb=t.over;
      if(m.name.startsWith('Under')) m.ourProb=t.under;
    }
  });
}

/* ================================================================
   STATISTICAL MODELS
================================================================ */
function calcExpectedGoals(homeStats, awayStats){
  // Extract from API-Sports format
  const hFor  = homeStats?.response?.goals?.for?.average?.home  || 1.4;
  const hAga  = homeStats?.response?.goals?.against?.average?.home || 1.1;
  const aFor  = awayStats?.response?.goals?.for?.average?.away  || 1.1;
  const aAga  = awayStats?.response?.goals?.against?.average?.away || 1.4;
  const leagueAvg = 1.3;
  const lhm = ((hFor/leagueAvg)*(aAga/leagueAvg)*leagueAvg);
  const lam = ((aFor/leagueAvg)*(hAga/leagueAvg)*leagueAvg);
  return {home: clamp(lhm,0.3,4), away: clamp(lam,0.3,4)};
}

function correctScoreMatrix(lh, la, maxG=5, dc=true){
  const probs={};
  for(let h=0;h<=maxG;h++)
    for(let a=0;a<=maxG;a++){
      const tau=dc?dcTau(h,a,lh,la,DC_RHO):1;
      probs[`${h}-${a}`]=poisson(h,lh)*poisson(a,la)*tau;
    }
  // Renormalize so corrected probabilities sum exactly to 1
  const total=Object.values(probs).reduce((s,v)=>s+v,0);
  for(const k of Object.keys(probs)) probs[k]/=total;
  return probs;
}

function topScores(matrix, n=10){
  return Object.entries(matrix).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

function calc1X2fromMatrix(matrix){
  let hw=0,d=0,aw=0;
  for(const [sc,p] of Object.entries(matrix)){
    const[h,a]=sc.split('-').map(Number);
    if(h>a)hw+=p; else if(h===a)d+=p; else aw+=p;
  }
  return{home:hw,draw:d,away:aw};
}

function calcBTTSfromMatrix(matrix){
  let yes=0;
  for(const[sc,p] of Object.entries(matrix)){
    const[h,a]=sc.split('-').map(Number);
    if(h>0&&a>0)yes+=p;
  }
  return{yes,no:1-yes};
}

function calcTotalsFromMatrix(matrix, line){
  let over=0;
  for(const[sc,p] of Object.entries(matrix)){
    const[h,a]=sc.split('-').map(Number);
    if(h+a>line)over+=p;
  }
  return{over,under:1-over};
}

function formToFactor(form){
  // form is array of 'W','D','L'
  if(!form||!form.length) return 0.5;
  const pts=form.reduce((s,r)=>s+(r==='W'?3:r==='D'?1:0),0);
  return clamp(pts/(form.length*3),0.1,0.9);
}

function oddsTo1X2Probs(bookmakers){
  const h2hBook = bookmakers.find(b=>b.markets?.find(m=>m.key==='h2h'));
  if(!h2hBook) return null;
  const mkt=h2hBook.markets.find(m=>m.key==='h2h');
  if(!mkt) return null;
  const outcomes=mkt.outcomes;
  const homeO=outcomes.find(o=>o.name===ST.match.home_team);
  const awayO=outcomes.find(o=>o.name===ST.match.away_team);
  const drawO=outcomes.find(o=>o.name==='Draw');
  if(!homeO||!awayO) return null;
  const odds=[homeO.price, drawO?.price||3.2, awayO.price];
  const [hp,dp,ap]=novig(odds);
  return {home:homeO.price,draw:drawO?.price||3.2,away:awayO.price,probHome:hp,probDraw:dp,probAway:ap};
}

function buildFootballMarkets(oddsData, matrix, lambda){
  const books = oddsData?.bookmakers||[];
  const markets = [];

  // Debug: show exactly what market types each bookmaker has after the multi-market merge
  console.group('[buildFootballMarkets] bookmaker → available market keys:');
  books.forEach(b=>console.log(`  ${b.key}: [${(b.markets||[]).map(m=>m.key).join(', ')||'—'}]`));
  console.groupEnd();

  // 1X2 — from API if available, else model-only
  const h2hMkt = buildMarket(books,'h2h','Match Result 1X2','Main',matrix?calc1X2fromMatrix(matrix):null,ST.match?.home_team,ST.match?.away_team);
  if(h2hMkt) markets.push(...h2hMkt);

  // Draw No Bet — API first (cat: Main), model fallback
  const dnbMkt=buildMarket(books,'draw_no_bet','Draw No Bet','Main',null,ST.match?.home_team,ST.match?.away_team);
  if(dnbMkt) markets.push(...dnbMkt);
  else if(matrix){
    const p=calc1X2fromMatrix(matrix);
    const total=p.home+p.away;
    markets.push(
      makeMarket('dnb_h','Draw No Bet - '+ST.match?.home_team,'Main',p.home/total,null,null),
      makeMarket('dnb_a','Draw No Bet - '+ST.match?.away_team,'Main',p.away/total,null,null),
    );
  }

  // Double Chance — model-only (cat: Main; filtered from display when no FR odds)
  if(matrix){
    const p=calc1X2fromMatrix(matrix);
    markets.push(
      makeMarket('dc_1x','Double Chance 1X','Main',p.home+p.draw,null,null),
      makeMarket('dc_x2','Double Chance X2','Main',p.draw+p.away,null,null),
      makeMarket('dc_12','Double Chance 12','Main',p.home+p.away,null,null),
    );
  }

  // Lay betting (h2h_laying) — exchange back odds, API only
  const layMkt=buildMarket(books,'h2h_laying','Lay Bet','Lay',null,ST.match?.home_team,ST.match?.away_team);
  if(layMkt) markets.push(...layMkt);

  // BTTS — API first, then model (cat: Goals)
  const bttsMkt=buildMarket(books,'btts','Both Teams to Score','Goals',null,'Yes','No');
  if(bttsMkt) markets.push(...bttsMkt);
  else if(matrix){
    const btts=calcBTTSfromMatrix(matrix);
    markets.push(
      makeMarket('btts_yes','BTTS - Yes','Goals',btts.yes,null,null),
      makeMarket('btts_no','BTTS - No','Goals',btts.no,null,null),
    );
  }

  // Totals — standard 0.5/1.5/2.5/3.5/4.5 (cat: Goals)
  [0.5,1.5,2.5,3.5,4.5].forEach(line=>{
    const mkt=buildTotalMarket(books,'totals',line,'Goals',matrix);
    if(mkt){ markets.push(...mkt); return; }
    // Try alternate_totals (OddsAPI sometimes puts 0.5/1.5/3.5/4.5 here)
    const altMkt=buildTotalMarket(books,'alternate_totals',line,'Goals',matrix);
    if(altMkt){ markets.push(...altMkt); return; }
    // Model-only fallback
    if(matrix){
      const t=calcTotalsFromMatrix(matrix,line);
      markets.push(
        makeMarket(`ov${line}`,'Over '+line+' Goals','Goals',t.over,null,null),
        makeMarket(`un${line}`,'Under '+line+' Goals','Goals',t.under,null,null),
      );
    }
  });

  // 1st Half result + totals (model-only)
  if(matrix){
    const lhH=lambda.home/2, laH=lambda.away/2;
    const halfM=correctScoreMatrix(lhH,laH,3,false);
    const fh=calc1X2fromMatrix(halfM);
    markets.push(
      makeMarket('fh_h','HT Home Win','1st Half',fh.home,null,null),
      makeMarket('fh_d','HT Draw','1st Half',fh.draw,null,null),
      makeMarket('fh_a','HT Away Win','1st Half',fh.away,null,null),
    );
    [0.5,1.5].forEach(line=>{
      const t=calcTotalsFromMatrix(halfM,line);
      markets.push(
        makeMarket(`fh_ov${line}`,'1st Half Over '+line,'1st Half',t.over,null,null),
        makeMarket(`fh_un${line}`,'1st Half Under '+line,'1st Half',t.under,null,null),
      );
    });
  }

  // Clean sheets (model-only)
  if(matrix){
    let hClean=0,aClean=0;
    for(const[sc,p] of Object.entries(matrix)){
      const[h,a]=sc.split('-').map(Number);
      if(a===0) hClean+=p;
      if(h===0) aClean+=p;
    }
    markets.push(
      makeMarket('cs_h','Home Clean Sheet','Clean Sheet',hClean,null,null),
      makeMarket('cs_h_no','No Home Clean Sheet','Clean Sheet',1-hClean,null,null),
      makeMarket('cs_a','Away Clean Sheet','Clean Sheet',aClean,null,null),
      makeMarket('cs_a_no','No Away Clean Sheet','Clean Sheet',1-aClean,null,null),
    );
  }

  // HT/FT (model-only, top 4)
  if(matrix){
    const lhH=lambda.home/2,laH=lambda.away/2;
    const hm=correctScoreMatrix(lhH,laH,3,false);
    const ht_p=calc1X2fromMatrix(hm), ft_p=calc1X2fromMatrix(matrix);
    const htftRows=[];
    for(const[htl,htp] of [['Home',ht_p.home],['Draw',ht_p.draw],['Away',ht_p.away]])
      for(const[ftl,ftp] of [['Home',ft_p.home],['Draw',ft_p.draw],['Away',ft_p.away]])
        htftRows.push({label:`${htl}/${ftl}`,p:htp*ftp});
    htftRows.sort((a,b)=>b.p-a.p).slice(0,4).forEach(({label,p})=>{
      markets.push(makeMarket('htft_'+label,'HT/FT: '+label,'HT/FT',p,null,null));
    });
  }

  // Goalscorer markets — from API only, shown if data present
  const gsMkts = [
    {key:'player_goal_scorer_anytime', label:'Anytime Goalscorer', cat:'Scorers'},
    {key:'player_goal_scorer_first',   label:'First Goalscorer',   cat:'Scorers'},
  ];
  for(const {key,label,cat} of gsMkts){
    const mkt=buildPlayerMarket(books,key,label,cat);
    if(mkt) markets.push(...mkt);
  }

  return markets;
}

// Build player prop markets (anytime/first goalscorer)
function buildPlayerMarket(books, mktKey, label, cat){
  const results=[];
  books.forEach(book=>{
    const mkt=book.markets?.find(m=>m.key===mktKey);
    if(!mkt) return;
    mkt.outcomes.forEach(o=>{
      const key=mktKey+'_'+o.name.replace(/\s+/g,'_').toLowerCase();
      const existing=results.find(r=>r.id===key);
      if(existing){
        existing.books.push({name:book.title||book.key,odds:o.price,key:book.key});
        if(o.price>existing.bestOdds){existing.bestOdds=o.price;existing.bestBook=book.title||book.key;}
      } else {
        results.push({
          id:key, name:`${label}: ${o.name}`, fullName:`${label}: ${o.name}`, cat,
          outcome:o.name, ourProb:null,
          books:[{name:book.title||book.key,odds:o.price,key:book.key}],
          bestOdds:o.price, bestBook:book.title||book.key, line:null
        });
      }
    });
  });
  return results.length?results:null;
}

function buildMarket(books, mktKey, label, cat, probOverride, nameA, nameB){
  const results=[];
  books.forEach(book=>{
    const mkt=book.markets?.find(m=>m.key===mktKey);
    if(!mkt) return;
    // Debug: log raw outcomes with exact names so we can catch outcome ↔ bookmaker mismatches
    if(mktKey==='h2h'||mktKey==='h2h_laying'||mktKey==='draw_no_bet'||mktKey==='btts'){
      console.log(`[buildMarket ${mktKey}] ${book.key}:`,
        mkt.outcomes.map(o=>`"${o.name}"@${o.price}`).join(', '));
    }
    // For h2h: warn when API outcome names don't match ST.match team names (name mismatch = wrong outcome bucket)
    if(mktKey==='h2h' && nameA){
      const apiNames=mkt.outcomes.map(o=>o.name);
      if(!apiNames.includes(nameA)) console.warn(`[buildMarket h2h] ${book.key}: home_team "${nameA}" not in API outcomes [${apiNames.join(', ')}] — outcomes will create EXTRA rows, not merge with existing`);
      if(nameB && !apiNames.includes(nameB)) console.warn(`[buildMarket h2h] ${book.key}: away_team "${nameB}" not in API outcomes [${apiNames.join(', ')}]`);
    }
    mkt.outcomes.forEach(o=>{
      const key=mktKey+'_'+o.name.replace(/\s+/g,'_').toLowerCase();
      const existing=results.find(r=>r.id===key);
      if(existing){
        existing.books.push({name:book.title||book.key,odds:o.price,key:book.key});
        if(o.price>existing.bestOdds){existing.bestOdds=o.price;existing.bestBook=book.title||book.key;}
      } else {
        results.push({
          id:key, name:label+(o.name&&o.name!==nameA&&o.name!==nameB?' ('+o.name+')':' - '+o.name),
          fullName:label+' - '+o.name, cat, outcome:o.name,
          ourProb: probOverride?null:null,
          books:[{name:book.title||book.key,odds:o.price,key:book.key}],
          bestOdds:o.price, bestBook:book.title||book.key, line:o.point||null
        });
      }
    });
  });
  return results.length?results:null;
}

function buildTotalMarket(books, mktKey, forceLine, cat, matrix){
  const results=[];
  books.forEach(book=>{
    const mkt=book.markets?.find(m=>m.key===mktKey);
    if(!mkt) return;
    // Debug: log raw outcomes so we can verify line → odds mapping
    console.log(`[buildTotalMarket ${mktKey} forceLine=${forceLine}] ${book.key}:`,
      mkt.outcomes.map(o=>`${o.name}(pt:${o.point??'?'})@${o.price}`).join(', '));
    mkt.outcomes.forEach(o=>{
      // BUG FIX: when a specific line is requested, skip outcomes that belong to a different line.
      // Without this, Over 2.5 @ 1.72 was being merged into the Over 0.5 bucket, inflating odds.
      if(forceLine!=null && o.point!=null && o.point!==forceLine) return;
      const line=forceLine??o.point??2.5;
      const key=mktKey+'_'+o.name+'_'+line;
      const label=(o.name==='Over'?'Over ':'Under ')+line;
      const existing=results.find(r=>r.id===key);
      if(existing){
        existing.books.push({name:book.title||book.key,odds:o.price,key:book.key});
        if(o.price>existing.bestOdds){existing.bestOdds=o.price;existing.bestBook=book.title||book.key;}
      } else {
        results.push({
          id:key, name:label, fullName:label, cat,
          ourProb:matrix?calcTotalsFromMatrix(matrix,line)[o.name==='Over'?'over':'under']:null,
          books:[{name:book.title||book.key,odds:o.price,key:book.key}],
          bestOdds:o.price, bestBook:book.title||book.key, line
        });
      }
    });
  });
  return results.length?results:null;
}

function enrichWithProbs(markets, matrix, lambda){
  markets.forEach(m=>{
    if(m.ourProb!==null&&m.ourProb!==undefined) return;
    if(!matrix) return;
    const n=m.outcome||m.name;
    const p1X2=calc1X2fromMatrix(matrix);
    if(m.cat==='Main'&&m.id.includes('h2h')){
      if(n===ST.match?.home_team) m.ourProb=p1X2.home;
      else if(n==='Draw') m.ourProb=p1X2.draw;
      else if(n===ST.match?.away_team) m.ourProb=p1X2.away;
    }
    if((m.cat==='Totals'||m.cat==='Goals O/U'||m.cat==='Goals')&&m.line&&!m.id.startsWith('btts')){
      const t=calcTotalsFromMatrix(matrix,m.line);
      if(m.name.startsWith('Over')) m.ourProb=t.over;
      else if(m.name.startsWith('Under')) m.ourProb=t.under;
    }
    if((m.cat==='BTTS'||m.cat==='Goals')&&m.id.startsWith('btts')){
      const btts=calcBTTSfromMatrix(matrix);
      if(m.name.includes('Yes')) m.ourProb=btts.yes;
      else if(m.name.includes('No')) m.ourProb=btts.no;
    }
    if((m.cat==='Draw No Bet'||m.id.startsWith('draw_no_bet')||m.id.startsWith('dnb'))&&m.books.length){
      const p=calc1X2fromMatrix(matrix), total=p.home+p.away;
      const n=m.outcome||m.name;
      if(n===ST.match?.home_team||m.name.includes('Home')||m.id.includes('home'))
        m.ourProb=p.home/total;
      else if(n===ST.match?.away_team||m.name.includes('Away')||m.id.includes('away'))
        m.ourProb=p.away/total;
    }
    if(m.cat==='Lay'&&m.books.length){
      const p=calc1X2fromMatrix(matrix);
      const n=m.outcome||m.name;
      if(n===ST.match?.home_team) m.ourProb=p.home;
      else if(n==='Draw') m.ourProb=p.draw;
      else if(n===ST.match?.away_team) m.ourProb=p.away;
    }
    if(m.cat==='Scorers'&&m.books.length&&m.ourProb==null){
      // Use no-vig from available bookmakers as proxy for goalscorer probability
      const allOdds=m.books.map(b=>b.odds);
      const implied=allOdds.reduce((s,o)=>s+toImplied(o),0)/allOdds.length;
      m.ourProb=clamp(implied,0.01,0.99);
    }
    if(m.cat==='Handicap'&&m.books.length){
      m.ourProb=toImplied(m.bestOdds);
    }
  });
  return markets;
}

function calcAllEV(markets){
  markets.forEach(m=>{
    if(m.ourProb!==null&&m.ourProb!==undefined&&m.bestOdds){
      m.ev=calcEV(m.ourProb, m.bestOdds);
    } else if(m.books.length){
      const allOdds=m.books.map(b=>b.odds);
      const implied=allOdds.reduce((s,o)=>s+toImplied(o),0)/allOdds.length;
      m.ourProb=implied;
      m.ev=0;
    }
  });
  markets.sort((a,b)=>(b.ev||0)-(a.ev||0));
  // Annotate each market with French-book-only best odds (for display/Kelly)
  applyFrenchBookFilter(markets);
  return markets;
}

function applyFrenchBookFilter(markets){
  markets.forEach(m=>{
    const frBooks=m.books.filter(b=>DISPLAY_BOOKS.includes(b.key));
    m.frBooks=frBooks;
    if(frBooks.length){
      let best=frBooks[0];
      frBooks.forEach(b=>{ if(b.odds>best.odds) best=b; });
      m.frBestOdds=best.odds;
      m.frBestBook=best.name;
      // EV vs French best odds (ourProb unchanged — still uses all books' no-vig)
      m.frEV=m.ourProb!=null?calcEV(m.ourProb, m.frBestOdds):undefined;
    } else {
      m.frBestOdds=null; m.frBestBook=null; m.frEV=undefined;
    }
  });
}

function getTopValueBets(markets, n=3){
  const thr=evThreshold();
  const minConf=CFG.minConfidence||7;
  // Only show bets where a French bookmaker has odds; EV vs French book odds
  return markets
    .filter(m=>m.frBestOdds&&m.frEV!==undefined&&m.frEV>=thr&&calcConfidence(m)>=minConf)
    .sort((a,b)=>(b.frEV||0)-(a.frEV||0))
    .slice(0,n);
}

function getQuickOdds(ev){
  const h2h=ev.bookmakers?.[0]?.markets?.find(m=>m.key==='h2h');
  if(!h2h) return null;
  const home=h2h.outcomes.find(o=>o.name===ev.home_team);
  const away=h2h.outcomes.find(o=>o.name===ev.away_team);
  const draw=h2h.outcomes.find(o=>o.name==='Draw');
  if(!home||!away) return null;
  return {home:home.price,away:away.price,draw:draw?.price||null};
}

function formatDate(d){
  const today=new Date();
  if(d.toDateString()===today.toDateString()) return 'Today';
  const tom=new Date(today.getTime()+864e5);
  if(d.toDateString()===tom.toDateString()) return 'Tomorrow';
  return d.toLocaleDateString('en',{month:'short',day:'numeric'});
}

function formatTime(d){
  return d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false})+' · '+d.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});
}
