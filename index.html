    });
    console.groupEnd();
  }

  const topBets=getTopValueBets(markets,3);

  setStep(steps,3,'done');
  setStep(steps,4,'active');

  // 5. AI
  if(CFG.anthropicKey){
    try{
      const q=oddsTo1X2Probs(oddsData?.bookmakers||[]);
      const oddsText=q?`Home: ${q.home} | Draw: ${q.draw} | Away: ${q.away}`:'N/A';
      const homeAvg = mlbModel ? `${mlbModel.h.rs.toFixed(2)} RS / ${mlbModel.h.ra.toFixed(2)} RA per game` : lambda.home.toFixed(2);
      const awayAvg = mlbModel ? `${mlbModel.a.rs.toFixed(2)} RS / ${mlbModel.a.ra.toFixed(2)} RA per game` : lambda.away.toFixed(2);
      aiText=await fetchAIAnalysis({
        home:ST.match.home_team, away:ST.match.away_team,
        competition:league.name, date:new Date(ST.match.commence_time).toLocaleDateString(),
        sport:sport.name, homeForm:null, awayForm:null,
        homeGoalsAvg:homeAvg, awayGoalsAvg:awayAvg,
        h2h:'No data available', odds:oddsText
      });
    }catch(e){ console.warn('AI:',e); }
  }
  setStep(steps,4,'done');
  hideLoading();

  renderFullAnalysis({oddsData,matrix,lambda,markets,topBets,aiText,league});

  // Supabase: save prediction and schedule result fetch 3h after kick-off (WC mode)
  if(wcMode&&matrix){
    savePrediction(markets,matrix,lambda,oddsData);
    const kickOff=new Date(ST.match.commence_time).getTime();
    const msUntilResult=kickOff+3*3600*1000-Date.now();
    const delay=Math.max(msUntilResult,5000);

    setTimeout(()=>fetchAndSaveResult(ST.match.id,ST.match.home_team,ST.match.away_team,ST.match.commence_time),delay);
  }
}

// Binary search for (lh, la) whose Poisson score matrix yields the given 1X2 probabilities.
// Two-pass: first find the lh/la ratio (controls home/away split), then find the
// total lh+la (controls absolute win prob / draw rate).
function lambdaFromBookProbs(pHome, pDraw, pAway){
  const ITERS=50;
  // Safety: ensure probs are valid
  const total=pHome+pDraw+pAway;
  if(total<=0) return {home:1.25, away:1.25};
  const pH=pHome/total, pA=pAway/total;
  const targetSplit=pH/(pH+pA);

  // Pass 1: binary-search ratio r = lh/la at a fixed total of 2.5
  let rLo=0.05, rHi=25.0, r=1.0;
  for(let i=0;i<ITERS;i++){
    r=(rLo+rHi)/2;
    const lh0=r*2.5/(r+1), la0=2.5/(r+1);
    const p0=calc1X2fromMatrix(correctScoreMatrix(lh0,la0,7));
    const split=p0.home/(p0.home+p0.away);
    if(split<targetSplit) rLo=r; else rHi=r;
  }

  // Pass 2: binary-search total t to match absolute pHome (ratio r fixed from pass 1)
  let tLo=0.2, tHi=10.0, lhFinal=1.25, laFinal=1.25;
  for(let i=0;i<ITERS;i++){
    const t=(tLo+tHi)/2;
    const lh=r*t/(r+1), la=t/(r+1);
    const p=calc1X2fromMatrix(correctScoreMatrix(lh,la,7));
    if(p.home<pH) tLo=t; else tHi=t;
    lhFinal=lh; laFinal=la;
  }

  return {home:clamp(lhFinal,0.3,4.0), away:clamp(laFinal,0.3,4.0)};
}

function estimateLambdaFromOdds(oddsData){
  if(!oddsData?.bookmakers?.length) return null;
  const q=oddsTo1X2Probs(oddsData.bookmakers);
  if(!q) return null;
  return lambdaFromBookProbs(q.probHome, q.probDraw, q.probAway);
}

function renderStatBar(label,valA,valB,ratio){
  const pct=clamp(ratio||0.5,0.05,0.95)*100;
  return `

        <div class="stat-bar home" style="width:${pct}%"></div>
      </div>
      <div class="stat-bar-wrap">
        <div class="stat-bar away" style="width:${100-pct}%"></div>
      </div>
      <div class="stat-val away" style="color:var(--blue)">${valB}</div>

function renderConsensusProbabilities(){
  if(!ST.odds?.bookmakers?.length) return '<div style="color:var(--text3);font-size:13px">No odds data available</div>';
  const books=ST.odds.bookmakers;
  const h2hBook=books.find(b=>b.markets?.find(m=>m.key==='h2h'));
  if(!h2hBook) return '<div style="color:var(--text3);font-size:13px">No 1X2 data</div>';
  const mkt=h2hBook.markets.find(m=>m.key==='h2h');
  const outcomes=mkt.outcomes;
  const allPrices={};
  books.forEach(b=>{
    const m=b.markets?.find(m=>m.key==='h2h');
    if(!m) return;
    m.outcomes.forEach(o=>{
      if(!allPrices[o.name]) allPrices[o.name]=[];
      allPrices[o.name].push(o.price);
    });
  });
  const avgPrices={};
  Object.entries(allPrices).forEach(([n,arr])=>avgPrices[n]=arr.reduce((a,b)=>a+b,0)/arr.length);
  const allOdds=Object.values(avgPrices);
  const implied=allOdds.map(o=>1/o);
  const sum=implied.reduce((a,b)=>a+b,0);
  const fair=implied.map(p=>p/sum);
  const names=Object.keys(avgPrices);

  return names.map((n,i)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div>
        <div style="font-size:13px;font-weight:600">${n}</div>
        <div style="font-size:11px;color:var(--text3)">Avg odds: ${fmtOdds(avgPrices[n])}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:18px;font-weight:800;color:${i===0?'var(--orange)':i===1?'var(--text2)':'var(--blue)'}">${fmtPct(fair[i])}</div>
        <div style="font-size:11px;color:var(--text3)">no-vig prob</div>
      </div>
    </div>
    <div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:12px">
      <div style="width:${(fair[i]*100).toFixed(1)}%;height:100%;border-radius:3px;background:${i===0?'var(--orange)':i===1?'var(--text3)':'var(--blue)'}"></div>
    </div>
  `).join('');
}

function renderMarketsTable(markets, showModelOnly=false){
  if(!markets.length) return '<div style="padding:16px;color:var(--text3);font-size:13px">No data for this category</div>';

  const withFROdds=markets.filter(m=>m.frBooks&&m.frBooks.length>0);
  const withAnyOdds=markets.filter(m=>m.books.length>0||m.bestOdds);
  const modelOnly=markets.filter(m=>!m.books.length&&!m.bestOdds);

  let displayMarkets;
  if(showModelOnly){
    // Goals tab: show every row — FR-odds rows first, then no-FR bookmaker rows, then model-only.
    const withAnyNotFR=withAnyOdds.filter(m=>!(m.frBooks&&m.frBooks.length>0));
    displayMarkets=[...withFROdds,...withAnyNotFR,...modelOnly];
  } else {
    // Other tabs: FR-odds rows only; fall back to any-bookmaker or model-only when none.
    displayMarkets=withFROdds.length?withFROdds:withAnyOdds.length?withAnyOdds:modelOnly;
  }

  // Column headers come only from rows that actually have FR odds (not dimmed rows)
  const frBookEntries=withFROdds.flatMap(m=>(m.frBooks||[]).map(b=>({key:b.key,name:b.name})));
  const frBookNames=[...new Map(frBookEntries.map(b=>[b.key,b.name])).entries()].map(([,name])=>name);
  const hasFrOdds=frBookNames.length>0;

  return `
  <div style="overflow-x:auto">
  <table class="market-table" style="min-width:${hasFrOdds?500:400}px">
    <thead><tr>
      <th>Market</th>
      <th>Our Prob</th>
      ${hasFrOdds?frBookNames.map(n=>`<th>${n}</th>`).join(''):''}
      <th>${hasFrOdds?'Best FR Odds':'Model Prob'}</th>
      <th>EV% <span style="font-size:9px;color:#c8a800;font-weight:600">🇫🇷</span></th>
    </tr></thead>
    <tbody>
    ${displayMarkets.map(m=>{
      const isModelOnly=!m.books.length&&!m.bestOdds;
      // isDimmed: Goals-tab row with no FR bookmaker odds (either no-FR bookmaker data or model-only)
      const isDimmed=showModelOnly&&!(m.frBooks&&m.frBooks.length>0);
      const ev=isDimmed?null:(m.frEV!=null?m.frEV:m.ev);
      const thr=evThreshold();
      const evClass=ev!=null?(ev>thr*2?'strong':ev>=thr?'mild':ev>0?'neutral':'negative'):'neutral';
      const evTxt=ev!=null?(ev>=0?'+':'')+fmtPct(ev):'-';
      return `<tr${isDimmed?' style="opacity:0.55"':isModelOnly?' style="opacity:0.6"':''}>
        <td>
          <span class="mkt-name">${m.name}</span>
          ${m.line!==null&&m.line!==undefined?` <span style="font-size:11px;color:var(--text3)">(${m.line})</span>`:''}
          ${isDimmed?'<span style="font-size:10px;color:var(--text3);margin-left:4px;font-style:italic">no FR odds</span>':isModelOnly?'<span style="font-size:10px;color:var(--text3);margin-left:4px">model</span>':''}
        </td>
        <td class="mkt-our-prob">${m.ourProb!==null&&m.ourProb!==undefined?fmtPct(m.ourProb):'-'}</td>
        ${hasFrOdds?frBookNames.map(bn=>{
          const bk=isDimmed?null:(m.frBooks||[]).find(b=>b.name===bn);
          return `<td>${bk?`<span class="${bk.odds===m.frBestOdds?'book-chip best':'book-chip'}">${fmtOdds(bk.odds)}</span>`:'<span style="color:var(--text3)">-</span>'}</td>`;
        }).join(''):''}
        <td>${isDimmed
          ? `<span style="color:var(--text3);font-size:12px">Model only</span><div style="font-size:10px;color:var(--text3);font-style:italic">Check bookie site</div>`
          : isModelOnly
            ? `<span style="color:var(--text3);font-size:12px">${m.ourProb!=null?fmtPct(m.ourProb):'-'}</span>`
            : `<strong>${m.frBestOdds?fmtOdds(m.frBestOdds):'-'}</strong>${m.frBestBook?`<div style="font-size:10px;color:var(--text3)">${m.frBestBook}</div>`:''}`
        }</td>
        <td><span class="ev-badge ${isDimmed?'neutral':m.frBestOdds?evClass:isModelOnly?'neutral':'negative'}">${isDimmed||!m.frBestOdds?'–':evTxt}</span></td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>
  ${showModelOnly&&displayMarkets.some(m=>!(m.frBooks&&m.frBooks.length>0))?'<div style="padding:6px 12px 10px;font-size:11px;color:var(--text3);font-style:italic">Dimmed rows: no FR bookmaker odds available — check Winamax/Betclic/Unibet/PMU directly for current lines.</div>':''}
  </div>`;
}

function renderOneTeamForm(teamName){
  // Prefer live API-Sports data fetched during analysis; fall back to static table
  const matches=(ST.teamForm&&ST.teamForm[teamName]?.length?ST.teamForm[teamName]:null)||lookupLast5(teamName);
  if(!matches||!matches.length) return null;
  const r=formRating(matches);
  const label=r>=0.6?'In form':r<=0.33?'Out of form':'Mixed form';
  const indicatorCls=r>=0.6?'in':r<=0.33?'out':'mixed';
  const totalGF=matches.reduce((s,m)=>s+m.gf,0);
  const totalGA=matches.reduce((s,m)=>s+m.ga,0);
  const gfAvg=(totalGF/matches.length).toFixed(1);
  const gaAvg=(totalGA/matches.length).toFixed(1);
  const dots=matches.map(m=>`<span class="form-dot ${m.result}" title="${m.opponent} ${m.gf}–${m.ga}">${m.result}</span>`).join('');
  const rows=matches.map(m=>`
    <div class="form-match-row">
      <span class="form-dot ${m.result}" style="width:20px;height:20px;font-size:10px">${m.result}</span>
      <span style="flex:1;color:var(--text2)">vs ${m.opponent}</span>
      <span style="font-weight:700;color:${m.gf>m.ga?'var(--green)':m.gf<m.ga?'var(--red)':'var(--text2)'}">${m.gf}–${m.ga}</span>
      <span style="color:var(--text3);font-size:10px;min-width:70px;text-align:right">${m.comp}</span>
    </div>`).join('');
  return {dots, rows, label, indicatorCls, gfAvg, gaAvg, r};
}

function renderValueBetsSection(markets){
  const thr=evThreshold();
  const minConf=CFG.minConfidence||7;
  // Only show bets available at French bookmakers; sort/filter by French EV
  const valued=markets
    .filter(m=>m.frBestOdds&&m.frEV!==undefined&&m.frEV>=thr&&calcConfidence(m)>=minConf)
    .sort((a,b)=>(b.frEV||0)-(a.frEV||0))
    .slice(0,8);
  if(!valued.length){
    const thrPct=Math.round(thr*100);
    const noFrOdds=markets.filter(m=>!m.frBestOdds).length;
    const aboveThrButLowConf=markets.filter(m=>m.frBestOdds&&m.frEV>=thr&&calcConfidence(m)<minConf).length;
    const posEVBelowThr=markets.filter(m=>m.frBestOdds&&m.frEV>0&&m.frEV<thr).length;
    const hints=[];
    if(noFrOdds) hints.push(`${noFrOdds} markets have no French bookmaker odds`);
    if(aboveThrButLowConf) hints.push(`${aboveThrButLowConf} filtered by confidence < ${minConf}`);
    if(posEVBelowThr) hints.push(`${posEVBelowThr} below ${thrPct}% EV at FR books`);
    return `<div style="color:var(--text3);font-size:13px">No value bets found above ${thrPct}% EV (FR books) with confidence ≥ ${minConf}${hints.length?' — '+hints.join(', '):''}.</div>`;
  }
  return `<div class="value-bets-list">${valued.map((m,i)=>renderVBCard(m,i)).join('')}</div>`;
}

function renderVBCard(m,i){
  const cls=i===0?'top1':i===1?'top2':i===2?'top3':'';
  const isBot=i===0;
  const conf=calcConfidence(m);
  // Display uses French-book odds/EV; fallback to global if no FR odds (shouldn't reach here normally)
  const displayOdds=m.frBestOdds||m.bestOdds;
  const displayBook=m.frBestBook||m.bestBook;
  const ev=m.frEV!=null?m.frEV:(m.ev||0);
  const evStr=(ev>=0?'+':'')+fmtPct(ev);
  const kelly=m.ourProb!=null&&displayOdds?calcKelly(m.ourProb,displayOdds):0;
  const kellyPct=fmtPct(kelly);
  const stake=(kelly*CFG.bankroll).toFixed(0);
  const kellyHtml=kelly>0
    ?`<div class="vb-kelly">
        <span class="kelly-pct">${kellyPct} Kelly</span>
        <span class="kelly-stake">€${stake} recommended</span>
        <span class="kelly-edge">Edge: ${evStr}</span>
      </div>`
    :'';
  return `
  <div class="vb-card ${cls}">
    <div class="vb-header">
      <div class="vb-market">${m.name}</div>
      ${isBot?'<span class="vb-badge bot">🏆 BET OF MATCH</span>':ev>=0.08?'<span class="vb-badge strong-ev">STRONG</span>':ev>=evThreshold()?'<span class="vb-badge val">VALUE</span>':''}
    </div>
    <div class="vb-details">
      <div class="vb-detail">
        <div class="dl">Best FR Odds</div>
        <div class="dv ${isBot?'gold':i===1?'green':''}">${fmtOdds(displayOdds)}</div>
        <div style="font-size:11px;color:var(--text3)">${displayBook||''}</div>
      </div>
      <div class="vb-detail">
        <div class="dl">Expected Value</div>
        <div class="dv ${ev>=evThreshold()?'green':ev>0?'':'color-red'}">${evStr}</div>
      </div>
      <div class="vb-detail">
        <div class="dl">Our Probability</div>
        <div class="dv">${m.ourProb!==null&&m.ourProb!==undefined?fmtPct(m.ourProb):'-'}</div>
      </div>
      <div class="vb-detail">
        <div class="dl">Confidence</div>
        <div class="dv">${conf}/10</div>
      </div>
    </div>
    ${kellyHtml}
    <div class="confidence-bar"><div class="confidence-fill" style="width:${conf*10}%"></div></div>
    <div class="confidence-label">Confidence: ${conf}/10</div>
  </div>`;
}

function calcConfidence(m){
  let score=5;
  if(m.books.length>=3) score+=1;
  if(m.books.length>=5) score+=1;
  if(m.ev>0.05) score+=1;
  if(m.ev>0.1) score+=1;
  if(m.ourProb>0.5&&m.ourProb<0.8) score+=0.5;
  return Math.min(10,Math.round(score*10)/10);
}

function renderAISection(text){
  if(!CFG.anthropicKey){
    return `<div style="text-align:center;padding:20px">
      <div style="font-size:32px;margin-bottom:12px">🤖</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:8px">AI Scout Report requires an Anthropic API key</div>
      <button class="nav-btn" onclick="openSettings()" style="margin:0 auto">Add API Key in Settings</button>
    </div>`;
  }
  if(!text) return '<div style="color:var(--text3);font-size:13px;padding:10px">AI analysis unavailable for this match</div>';
  return formatAIText(text);
}

function formatAIText(text){
  const sections=text.split(/\*\*([^*]+)\*\*/);
  let html='';
  for(let i=0;i<sections.length;i++){
    if(i%2===0){
      if(sections[i].trim()){
        const lines=sections[i].split('\n').filter(l=>l.trim());
        lines.forEach(l=>{
          if(l.trim().startsWith('-')||l.trim().startsWith('•')){
            html+=`<div class="ai-key-point">${l.replace(/^[-•]\s*/,'')}</div>`;
          } else {
            html+=`<p style="font-size:14px;color:var(--text2);margin-bottom:8px">${l}</p>`;
          }
        });
      }
    } else {
      html+=`<div class="ai-section"><h4>${sections[i]}</h4>`;
      if(i+1<sections.length){
        const content=sections[i+1];
        const lines=content.split('\n').filter(l=>l.trim());
        lines.slice(0,3).forEach(l=>{
          if(l.trim().startsWith('-')||l.trim().startsWith('•')){
            html+=`<div class="ai-key-point">${l.replace(/^[-•]\s*/,'')}</div>`;
          } else {
            html+=`<p style="font-size:14px;color:var(--text2);margin-bottom:6px">${l}</p>`;
          }
        });
        sections[i+1]='';
      }
      html+=`</div>`;
    }
  }
  return html||`<p style="font-size:14px;color:var(--text2)">${text}</p>`;
}

function renderVerdictSection(topBets, allMarkets){
  const interest=calcMatchInterest(allMarkets);
  const stars='★'.repeat(Math.round(interest/2))+'☆'.repeat(5-Math.round(interest/2));

  // Kelly exposure summary (using French book odds)
  const kellyBets=topBets.filter(m=>m.ourProb!=null&&(m.frBestOdds||m.bestOdds)&&calcKelly(m.ourProb,m.frBestOdds||m.bestOdds)>0);
  const totalKelly=kellyBets.reduce((s,m)=>s+calcKelly(m.ourProb,m.frBestOdds||m.bestOdds),0);
  const totalStake=(totalKelly*CFG.bankroll).toFixed(0);
  const exposureHtml=kellyBets.length?`
  <div style="margin-top:12px;padding:12px;background:var(--bg3);border-radius:var(--r2);border:1px solid ${totalKelly>0.15?'rgba(255,80,80,0.5)':'var(--border)'}">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:13px;font-weight:700">Total Kelly Exposure <span style="font-size:11px;color:#c8a800">🇫🇷 FR books</span></div>
        <div style="font-size:11px;color:var(--text3)">Across ${kellyBets.length} value bet${kellyBets.length!==1?'s':''} (half-Kelly, bankroll €${CFG.bankroll})</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:20px;font-weight:800;color:${totalKelly>0.15?'#ff5050':totalKelly>0.08?'var(--gold)':'var(--green)'}">${fmtPct(totalKelly)}</div>
        <div style="font-size:12px;color:var(--text3)">€${totalStake} total</div>
      </div>
    </div>
    ${totalKelly>0.15?'<div style="margin-top:8px;padding:6px 10px;background:rgba(255,80,80,0.12);border-radius:6px;font-size:12px;color:#ff9090">⚠ Total exposure exceeds 15% of bankroll — consider reducing stakes</div>':''}
  </div>`:'';

  return `
  <div class="verdict-interest">
    <div>
      <div class="interest-label">Match Betting Interest</div>
      <div style="font-size:12px;color:var(--text3)">Based on available value</div>
    </div>
    <div style="margin-left:auto;text-align:right">
      <div class="interest-score">${interest}/10</div>
      <div style="color:var(--gold);font-size:16px;letter-spacing:2px">${stars}</div>
    </div>
  </div>
  <div class="verdict-bets">
    ${topBets.length?topBets.map((m,i)=>{
      const dispOdds=m.frBestOdds||m.bestOdds;
      const dispBook=m.frBestBook||m.bestBook;
      const dispEV=m.frEV!=null?m.frEV:m.ev;
      const kelly=m.ourProb!=null&&dispOdds?calcKelly(m.ourProb,dispOdds):0;
      const stakeStr=kelly>0?` · €${(kelly*CFG.bankroll).toFixed(0)} Kelly`:'';
      return `
      <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border-radius:var(--r2);border:1px solid ${i===0?'rgba(255,215,0,0.3)':'var(--border)'}">
        <div style="width:28px;height:28px;border-radius:50%;background:${i===0?'var(--gold)':i===1?'var(--green)':'var(--blue)'};display:flex;align-items:center;justify-content:center;font-weight:800;color:#000;font-size:14px;flex-shrink:0">${i+1}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700">${m.name}</div>
          <div style="font-size:12px;color:var(--text3)">${dispBook||'Best bookmaker'}${stakeStr}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:800;color:${i===0?'var(--gold)':'var(--green)'}">${fmtOdds(dispOdds)}</div>
          <div style="font-size:12px;color:var(--text3)">EV: ${dispEV>0?'+':''}${fmtPct(dispEV)}</div>
        </div>
      </div>`;
    }).join(''):'<div style="color:var(--text3);font-size:13px">No value bets at French bookmakers</div>'}
  </div>
  ${exposureHtml}`;
}

function calcMatchInterest(markets){
  const valueCount=markets.filter(m=>m.ev>=evThreshold()).length;
  const bookCount=markets.reduce((s,m)=>s+m.books.length,0)/(markets.length||1);
  return Math.min(10,Math.round(clamp(valueCount*1.5+bookCount*0.5,0,10)));
}

/* ================================================================
   LOADING
================================================================ */
function showLoading(text,steps){
  const l=$('loading');
  $('loading-text').textContent=text;
  $('loading-steps').innerHTML=steps.map((s,i)=>`
    <div class="loading-step" id="ls-${i}">
      <span class="ls-icon">⬜</span>
      <span>${s.icon} ${s.label}</span>
    </div>`).join('');
  l.classList.add('show');
}

function setStep(steps,idx,state){
  const el=$('ls-'+idx);
  if(!el) return;
  el.className='loading-step '+state;
  el.querySelector('.ls-icon').textContent=state==='done'?'✅':state==='active'?'⏳':'⬜';
}

function hideLoading(){ $('loading').classList.remove('show'); }

/* ================================================================
   SETTINGS
================================================================ */
function openSettings(){
  $('inp-anthropic').value=CFG.anthropicKey;
  $('inp-odds').value=CFG.oddsKey;
  $('inp-apisports').value=CFG.sportsKey;
  $('inp-fdkey').value=CFG.fdKey;
  $('inp-rapidkey').value=CFG.rapidKey;
  $('inp-bankroll').value=CFG.bankroll;
  const thr=Math.round(CFG.evThreshold*100);
  $('inp-ev-threshold').value=thr;
  $('ev-threshold-label').textContent=thr+'%';
  $('inp-min-confidence').value=CFG.minConfidence;
  $('min-conf-label').textContent=CFG.minConfidence;
  $('settings-modal').classList.add('show');
}
function closeSettings(){ $('settings-modal').classList.remove('show'); }
function saveSettings(){
  CFG.anthropicKey=$('inp-anthropic').value.trim();
  CFG.oddsKey=$('inp-odds').value.trim();
  CFG.sportsKey=$('inp-apisports').value.trim();
  CFG.fdKey=$('inp-fdkey').value.trim();
  CFG.rapidKey=$('inp-rapidkey').value.trim();
  localStorage.setItem('ba_rapidkey',CFG.rapidKey);
  const br=parseFloat($('inp-bankroll').value);
  if(br>0) CFG.bankroll=br;
  const evThr=parseInt($('inp-ev-threshold').value,10);
  if(evThr>=1&&evThr<=10) CFG.evThreshold=evThr/100;
  localStorage.setItem('ba_anthropic',CFG.anthropicKey);
  localStorage.setItem('ba_fdkey',CFG.fdKey);
  const minConf=parseFloat($('inp-min-confidence').value);
  if(minConf>=5&&minConf<=10) CFG.minConfidence=minConf;
  localStorage.setItem('ba_bankroll',String(CFG.bankroll));
  localStorage.setItem('ba_ev_threshold',String(CFG.evThreshold));
  localStorage.setItem('ba_min_confidence',String(CFG.minConfidence));
  FD_WC_TEAMS=null; // reset team ID cache when key changes
  closeSettings();
}

/* ================================================================
   MARKET TABS
================================================================ */
function switchMktTab(cat, btn){
  document.querySelectorAll('.market-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.market-panel').forEach(p=>p.classList.remove('active'));
  const panel=$('mpanel-'+cat.replace(/\//g,'-'));
  if(panel) panel.classList.add('active');
}

/* ================================================================
   INIT
================================================================ */
function init(){
  CFG.anthropicKey=localStorage.getItem('ba_anthropic')||'';
  CFG.fdKey=localStorage.getItem('ba_fdkey')||CFG.fdKey;
  CFG.rapidKey=localStorage.getItem('ba_rapidkey')||CFG.rapidKey;
  const savedBankroll=parseFloat(localStorage.getItem('ba_bankroll'));
  if(savedBankroll>0) CFG.bankroll=savedBankroll;
  const savedEVThr=parseFloat(localStorage.getItem('ba_ev_threshold'));
  if(savedEVThr>0) CFG.evThreshold=savedEVThr;
  const savedMinConf=parseFloat(localStorage.getItem('ba_min_confidence'));
  if(savedMinConf>=5) CFG.minConfidence=savedMinConf;
  // Clear stale session cache on load so API endpoint changes take effect
  try{ sessionStorage.clear(); }catch(e){}
  loadCalibration(); // async — loads confederation factors from Supabase in background
  renderHome();
}

init();
</script>
